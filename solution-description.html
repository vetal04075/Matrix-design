<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solution · Description Block</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-elev: #12121a;
    --bg-elev-2: #191922;
    --purple: #8b8bff;
    --purple-soft: rgba(139, 139, 255, 0.12);
    --teal: #6ee7b7;
    --teal-soft: rgba(110, 231, 183, 0.12);
    --amber: #fbbf24;
    --amber-soft: rgba(251, 191, 36, 0.14);
    --text: #ededf2;
    --text-dim: #8a8a99;
    --text-faint: #4a4a5a;
    --border: #232330;
    --border-soft: #1c1c28;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(139, 139, 255, 0.08), 0 10px 40px rgba(0, 0, 0, 0.6);
  }

  .phone.light {
    --bg: #f5f4f0;
    --bg-elev: #ffffff;
    --bg-elev-2: #f5f4f0;
    --purple: #5c5cd6;
    --purple-soft: rgba(92, 92, 214, 0.10);
    --teal: #0fb87a;
    --teal-soft: rgba(15, 184, 122, 0.10);
    --amber: #c88a06;
    --amber-soft: rgba(200, 138, 6, 0.12);
    --text: #1a1a22;
    --text-dim: #6a6a78;
    --text-faint: #b8b8c2;
    --border: #e6e5dd;
    --border-soft: #ecebe4;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(92, 92, 214, 0.12), 0 10px 40px rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 14px;
  }

  .toggle {
    display: inline-flex;
    background: #1a1a22;
    border: 1px solid #2a2a35;
    border-radius: 999px;
    padding: 4px;
    gap: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .toggle button {
    background: transparent; border: 0;
    color: #8a8a99;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit; letter-spacing: inherit; text-transform: inherit;
    transition: all 0.25s ease;
  }
  .toggle button.active { background: #8b8bff; color: #0a0a0f; }

  .phone {
    width: 100%;
    max-width: 390px;
    aspect-ratio: 390 / 844;
    background: var(--bg);
    border-radius: 48px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-phone);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
  }

  .island {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 11;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 28px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; color: var(--text-dim); }
  .status-icons svg { width: 16px; height: 10px; }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    gap: 12px;
  }
  .nav-btn {
    width: 38px; height: 38px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text);
    cursor: pointer;
  }
  .nav-btn svg { width: 18px; height: 18px; }
  .nav-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-title .sep { color: var(--text-faint); font-family: 'DM Mono', monospace; }
  .nav-title .op { color: var(--purple); font-family: 'DM Mono', monospace; font-size: 18px; }

  /* Scroll */
  .scroll {
    flex: 1;
    overflow-y: auto;
    padding: 4px 16px 90px;
    scroll-behavior: smooth;
  }

  /* Step meta */
  .step-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .step-meta .step-badge {
    display: flex; align-items: center; gap: 8px;
  }
  .step-meta .step-num {
    width: 22px; height: 22px;
    border-radius: 7px;
    background: var(--purple-soft);
    color: var(--purple);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 500;
  }

  /* Card */
  .card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 16px;
    margin-bottom: 12px;
  }
  .card-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .card-title .marker {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--purple);
  }
  .card-title h3 {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--purple);
  }

  /* ========= FORMULA SUMMARY (still horizontal scroll — it's one object) ========= */
  .formula-summary {
    position: relative;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 14px 0;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .formula-summary::-webkit-scrollbar { display: none; }

  .formula-wrap-outer { position: relative; }
  .formula-wrap-outer::before,
  .formula-wrap-outer::after {
    content: '';
    position: absolute;
    top: 1px; bottom: 1px;
    width: 24px;
    pointer-events: none;
    z-index: 2;
    border-radius: 12px;
  }
  .formula-wrap-outer::before {
    left: 0;
    background: linear-gradient(90deg, var(--bg-elev), transparent);
  }
  .formula-wrap-outer::after {
    right: 0;
    background: linear-gradient(270deg, var(--bg-elev), transparent);
  }

  .formula-inner {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 0 24px;
    white-space: nowrap;
  }

  .fm-label {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .fm-label .letter { font-size: 18px; }
  .fm-label .eq, .fm-label .op-sym {
    color: var(--text-dim);
    font-weight: 300;
  }
  .fm-label.is-c .letter { color: var(--amber); }
  .fm-label.is-a .letter { color: var(--purple); }
  .fm-label.is-b .letter { color: var(--teal); }

  .inline-mx {
    display: inline-flex;
    align-items: stretch;
    gap: 4px;
    padding: 4px 2px;
  }
  .inline-bracket {
    width: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
  }
  .inline-bracket svg { width: 8px; height: 100%; }
  .inline-mx.is-a .inline-bracket { color: var(--purple); }
  .inline-mx.is-b .inline-bracket { color: var(--teal); }
  .inline-mx.is-c .inline-bracket { color: var(--amber); }

  .inline-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px 6px;
    padding: 2px;
  }
  .inline-grid > span {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 4px 3px;
    min-width: 22px;
  }

  .big-op {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 300;
    color: var(--text-dim);
    padding: 0 2px;
  }

  /* ========= COLLAPSE TOGGLE ========= */
  .toggle-desc {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }
  .toggle-desc:hover {
    border-color: var(--purple);
    background: var(--purple-soft);
  }
  .toggle-desc .t-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .toggle-desc .t-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 1px;
  }
  .toggle-desc .t-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toggle-desc .chev {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), color 0.2s ease, border-color 0.2s ease;
  }
  .toggle-desc:hover .chev {
    color: var(--purple);
    border-color: var(--purple);
  }
  .toggle-desc .chev svg { width: 14px; height: 14px; }

  .card[data-expanded="true"] .toggle-desc .chev { transform: rotate(180deg); }
  .card[data-expanded="true"] .toggle-desc .t-label::before { content: 'hide '; }
  .card[data-expanded="false"] .toggle-desc .t-label::before { content: 'show '; }

  /* ========= EXPANDED DESCRIPTION ========= */
  .description-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.45s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease, margin-top 0.3s ease;
    opacity: 0;
  }
  .card[data-expanded="true"] .description-body {
    max-height: 3000px;
    opacity: 1;
    margin-top: 14px;
  }

  .desc-intro {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  /* ========= COMPUTATION ROWS (Combined + flex-wrap) ========= */
  .comp-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .comp-row {
    display: flex;
    flex-wrap: wrap;           /* <-- KEY: rows wrap instead of h-scroll */
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.3;
    padding: 8px 10px 8px 6px;
    border-radius: 8px;
    border: 1px solid var(--border-soft);
    background: var(--bg);
  }

  /* Unbreakable token groups (letter + subscript) */
  .tok {
    display: inline-flex;
    align-items: baseline;
    flex-shrink: 0;
  }

  /* Index chip — always first, never wraps away from row */
  .idx-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    height: 22px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 0 6px;
    flex-shrink: 0;
    margin-right: 2px;
  }

  .v.c { color: var(--amber); font-weight: 500; }
  .v.a { color: var(--purple); font-weight: 500; }
  .v.b { color: var(--teal); font-weight: 500; }
  .v.num { color: var(--text); font-weight: 500; }
  .op {
    color: var(--text-dim);
    font-weight: 300;
    flex-shrink: 0;
  }
  .sub {
    font-size: 0.7em;
    opacity: 0.85;
    position: relative;
    top: 3px;
    margin-left: -1px;
  }

  /* Result with amber highlight */
  .result {
    background: var(--amber-soft);
    color: var(--amber);
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 500;
    flex-shrink: 0;
  }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 134px; height: 5px;
    background: var(--text);
    border-radius: 3px;
    opacity: 0.9;
    z-index: 30;
  }

  .controls-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #5a5a68;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>

  <div class="controls-hint">solution · description block</div>
  <div class="toggle" id="theme-toggle">
    <button data-theme="dark" class="active">Dark</button>
    <button data-theme="light">Light</button>
  </div>

  <div class="phone" id="phone">
    <div class="island"></div>

    <div class="status-bar">
      <span>11:51</span>
      <div class="status-icons">
        <span style="font-size:13px;letter-spacing:.5px;">•••</span>
        <svg viewBox="0 0 16 10" fill="none"><path d="M14 1v8M11 3v6M8 5v4M5 6v3M2 7v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <svg viewBox="0 0 22 10" fill="none">
          <rect x="1" y="1" width="17" height="8" rx="2" stroke="currentColor" stroke-width="1"/>
          <rect x="2.5" y="2.5" width="14" height="5" rx="1" fill="currentColor"/>
          <rect x="19" y="3.5" width="1.5" height="3" rx="0.5" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-title">
        <span>Matrix</span><span class="sep">·</span><span class="op">+</span><span>Addition</span>
      </div>
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 16V4M6 10l6-6 6 6M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="scroll">

      <div class="step-meta">
        <div class="step-badge">
          <span class="step-num">1</span>
          <span>solution</span>
        </div>
        <span>step 1 of 2</span>
      </div>

      <!-- ========= DESCRIPTION CARD ========= -->
      <div class="card" id="descCard" data-expanded="true">

        <div class="card-title">
          <span class="marker"></span>
          <h3>computation · c = a + b</h3>
        </div>

        <!-- Formula summary -->
        <div class="formula-wrap-outer">
          <div class="formula-summary">
            <div class="formula-inner">
              <span class="fm-label is-c">
                <span class="letter">C</span>
                <span class="eq">=</span>
              </span>
              <span class="fm-label is-a">
                <span class="letter">A</span>
              </span>
              <span class="big-op">+</span>
              <span class="fm-label is-b">
                <span class="letter">B</span>
                <span class="eq">=</span>
              </span>

              <span class="inline-mx is-a">
                <span class="inline-bracket">
                  <svg viewBox="0 0 8 100" preserveAspectRatio="none" fill="none">
                    <path d="M6 1 L2 1 L2 99 L6 99" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="inline-grid">
                  <span>4</span><span>2</span><span>1</span><span>3</span>
                  <span>0</span><span>1</span><span>−1</span><span>2</span>
                  <span>3</span><span>5</span><span>2</span><span>1</span>
                  <span>−2</span><span>0</span><span>1</span><span>1</span>
                </span>
                <span class="inline-bracket">
                  <svg viewBox="0 0 8 100" preserveAspectRatio="none" fill="none">
                    <path d="M2 1 L6 1 L6 99 L2 99" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              </span>

              <span class="big-op">+</span>

              <span class="inline-mx is-b">
                <span class="inline-bracket">
                  <svg viewBox="0 0 8 100" preserveAspectRatio="none" fill="none">
                    <path d="M6 1 L2 1 L2 99 L6 99" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="inline-grid">
                  <span>4</span><span>2</span><span>1</span><span>3</span>
                  <span>0</span><span>1</span><span>−1</span><span>2</span>
                  <span>3</span><span>5</span><span>2</span><span>1</span>
                  <span>−2</span><span>0</span><span>1</span><span>1</span>
                </span>
                <span class="inline-bracket">
                  <svg viewBox="0 0 8 100" preserveAspectRatio="none" fill="none">
                    <path d="M2 1 L6 1 L6 99 L2 99" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              </span>

              <span class="big-op">=</span>

              <span class="inline-mx is-c">
                <span class="inline-bracket">
                  <svg viewBox="0 0 8 100" preserveAspectRatio="none" fill="none">
                    <path d="M6 1 L2 1 L2 99 L6 99" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="inline-grid" style="color: var(--amber);">
                  <span>8</span><span>4</span><span>2</span><span>6</span>
                  <span>0</span><span>2</span><span>−2</span><span>4</span>
                  <span>6</span><span>10</span><span>4</span><span>2</span>
                  <span>−4</span><span>0</span><span>2</span><span>2</span>
                </span>
                <span class="inline-bracket">
                  <svg viewBox="0 0 8 100" preserveAspectRatio="none" fill="none">
                    <path d="M2 1 L6 1 L6 99 L2 99" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              </span>
            </div>
          </div>
        </div>

        <!-- Toggle -->
        <div class="toggle-desc" id="toggleBtn">
          <div>
            <span class="t-label">description</span>
          </div>
          <div class="t-right">
            <span class="t-meta">16 elements</span>
            <span class="chev">
              <svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
          </div>
        </div>

        <!-- Expanded body -->
        <div class="description-body">
          <div class="desc-intro">// element-by-element breakdown</div>
          <div class="comp-list" id="compList"></div>
        </div>

      </div>

    </div>

    <div class="home-indicator"></div>
  </div>

<script>
  const A = [[4,2,1,3],[0,1,-1,2],[3,5,2,1],[-2,0,1,1]];
  const B = A.map(row => row.slice());
  const C = A.map((row, i) => row.map((v, j) => v + B[i][j]));

  const list = document.getElementById('compList');
  function renderRows() {
    list.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      for (let j = 0; j < 4; j++) {
        const row = document.createElement('div');
        row.className = 'comp-row';
        const ij = `${i+1},${j+1}`;
        const a = A[i][j];
        const b = B[i][j];
        const c = C[i][j];
        const aStr = a < 0 ? `(${a})` : a;
        const bStr = b < 0 ? `(${b})` : b;

        // Each "tok" is an unbreakable group (letter + subscript)
        row.innerHTML = `
          <span class="idx-chip">r${i+1}·c${j+1}</span>
          <span class="tok"><span class="v c">c</span><span class="sub v c">${ij}</span></span>
          <span class="op">=</span>
          <span class="tok"><span class="v a">a</span><span class="sub v a">${ij}</span></span>
          <span class="op">+</span>
          <span class="tok"><span class="v b">b</span><span class="sub v b">${ij}</span></span>
          <span class="op">=</span>
          <span class="v num">${aStr}</span>
          <span class="op">+</span>
          <span class="v num">${bStr}</span>
          <span class="op">=</span>
          <span class="v num result">${c}</span>
        `;
        list.appendChild(row);
      }
    }
  }
  renderRows();

  // Toggle expanded
  const descCard = document.getElementById('descCard');
  const toggleBtn = document.getElementById('toggleBtn');
  toggleBtn.addEventListener('click', () => {
    const cur = descCard.dataset.expanded === 'true';
    descCard.dataset.expanded = cur ? 'false' : 'true';
  });

  // Theme
  const phone = document.getElementById('phone');
  const themeToggle = document.getElementById('theme-toggle');
  themeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    phone.classList.remove('light');
    if (btn.dataset.theme === 'light') phone.classList.add('light');
    themeToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
</script>

</body>
</html>
