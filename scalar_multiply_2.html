<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scalar multiply · HMLA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-elev: #12121a;
    --bg-elev-2: #191922;
    --purple: #8b8bff;
    --purple-soft: rgba(139, 139, 255, 0.12);
    --teal: #6ee7b7;
    --teal-soft: rgba(110, 231, 183, 0.12);
    --text: #ededf2;
    --text-dim: #8a8a99;
    --text-faint: #4a4a5a;
    --border: #232330;
    --border-soft: #1c1c28;
    --solve-text: #0a0a0f;
    --cell-empty: #4a4a5a;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(139, 139, 255, 0.08), 0 10px 40px rgba(0, 0, 0, 0.6);
  }

  .phone.light {
    --bg: #f5f4f0;
    --bg-elev: #ffffff;
    --bg-elev-2: #f5f4f0;
    --purple: #5c5cd6;
    --purple-soft: rgba(92, 92, 214, 0.10);
    --teal: #0fb87a;
    --teal-soft: rgba(15, 184, 122, 0.10);
    --text: #1a1a22;
    --text-dim: #6a6a78;
    --text-faint: #b8b8c2;
    --border: #e6e5dd;
    --border-soft: #ecebe4;
    --solve-text: #ffffff;
    --cell-empty: #c8c7bf;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(92, 92, 214, 0.12), 0 10px 40px rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; flex-direction: column; align-items: center;
    padding: 24px; gap: 14px;
  }

  .controls-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: #5a5a68;
    letter-spacing: 1px; text-transform: uppercase;
    text-align: center;
  }

  .toggle {
    display: inline-flex;
    background: #1a1a22; border: 1px solid #2a2a35;
    border-radius: 999px; padding: 4px; gap: 2px;
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .toggle button {
    background: transparent; border: 0;
    color: #8a8a99; padding: 8px 14px;
    border-radius: 999px; cursor: pointer;
    font: inherit; letter-spacing: inherit; text-transform: inherit;
    transition: all 0.25s ease;
  }
  .toggle button.active { background: #8b8bff; color: #0a0a0f; }

  /* PHONE */
  .phone {
    width: 100%; max-width: 390px;
    aspect-ratio: 390 / 844;
    background: var(--bg); border-radius: 48px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-phone);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
  }
  .island {
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000; border-radius: 20px; z-index: 11;
  }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 28px 0;
    font-size: 15px; font-weight: 600;
    flex-shrink: 0;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; color: var(--text-dim); }
  .status-icons svg { width: 16px; height: 10px; }

  /* NAV */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 14px; gap: 12px;
    flex-shrink: 0;
  }
  .nav-btn {
    width: 38px; height: 38px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .nav-btn:hover { border-color: var(--purple); background: var(--purple-soft); }
  .nav-btn svg { width: 18px; height: 18px; }
  .nav-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 500;
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-title .sep { color: var(--text-faint); font-family: 'DM Mono', monospace; }
  .nav-title .op {
    color: var(--purple);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
  }

  /* SIZE BAR */
  .size-bar {
    margin: 4px 16px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; flex-shrink: 0;
  }
  .size-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--text-dim);
    letter-spacing: 1px; text-transform: lowercase;
  }
  .size-ctrl {
    display: flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', monospace;
  }
  .size-ctrl .num {
    color: var(--purple);
    font-size: 15px; font-weight: 500;
    min-width: 14px; text-align: center;
  }
  .size-ctrl .x { color: var(--text-faint); font-size: 13px; }
  .size-btn {
    width: 26px; height: 26px;
    border-radius: 7px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }
  .size-btn:hover { border-color: var(--purple); color: var(--purple); }
  .size-btn:active { transform: scale(0.92); }

  /* MATRIX ROW — sized to match Addition: 4×4 cells around ~37px each */
  .matrix-row {
    display: flex; align-items: center; justify-content: center;
    padding: 0 16px; margin-bottom: 16px;
    gap: 6px; flex-shrink: 0;
  }

  .matrix-card {
    flex: 0 0 auto;
    width: 200px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px;
  }

  .matrix-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; padding: 0 2px;
  }
  .matrix-label {
    font-family: 'DM Mono', monospace;
    font-size: 15px; font-weight: 500;
    color: var(--purple);
    letter-spacing: 0.5px;
  }

  .matrix-actions { display: flex; gap: 4px; }
  .mx-act {
    width: 24px; height: 24px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .mx-act:hover { border-color: var(--text-dim); color: var(--text); }
  .mx-act svg { width: 11px; height: 11px; }

  .matrix-grid {
    display: grid; gap: 4px; padding: 2px;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
  }
  .cell {
    aspect-ratio: 1;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .cell:empty::before { content: '·'; color: var(--cell-empty); opacity: 0.6; }
  .cell.filled { color: var(--text); }

  /* k side — * sign + single input cell (same size as matrix cell) */
  .k-side {
    display: flex; align-items: center; gap: 8px;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .k-sign {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--text-dim);
    width: 12px; text-align: center;
  }
  .k-input {
    width: 38px; height: 38px;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 13px; font-weight: 500;
    color: var(--text);
    text-align: center;
    outline: 0;
    transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
    padding: 0;
  }
  .k-input::placeholder { color: var(--cell-empty); opacity: 0.6; }
  .k-input:focus {
    border-color: var(--purple);
    background: var(--purple-soft);
    color: var(--purple);
  }

  /* SOLVE */
  .solve-area {
    margin-top: auto;
    padding: 14px 16px;
    border-top: 1px solid var(--border-soft);
    flex-shrink: 0;
  }
  .solve-btn {
    width: 100%; height: 56px;
    background: var(--purple);
    color: var(--solve-text);
    border: 0; border-radius: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 15px; font-weight: 500;
    letter-spacing: 0.5px;
    display: flex; align-items: center; justify-content: center; gap: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 0 30px rgba(139, 139, 255, 0.3);
  }
  .phone.light .solve-btn { box-shadow: 0 10px 30px rgba(92, 92, 214, 0.35); }
  .solve-btn:hover { filter: brightness(1.08); }
  .solve-btn:active { transform: translateY(1px); }
  .solve-btn .eq { opacity: 0.6; font-weight: 400; }

  .home-indicator {
    position: absolute;
    bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px;
    background: var(--text);
    border-radius: 3px;
    opacity: 0.9;
    z-index: 30;
  }
</style>
</head>
<body>

  <div class="controls-hint">scalar multiplication · k · A</div>
  <div class="toggle" id="theme-toggle">
    <button data-theme="dark" class="active">Dark</button>
    <button data-theme="light">Light</button>
  </div>

  <div class="phone" id="phone">
    <div class="island"></div>

    <div class="status-bar">
      <span>23:09</span>
      <div class="status-icons">
        <span style="font-size:13px;letter-spacing:.5px;">•••</span>
        <svg viewBox="0 0 16 10" fill="none"><path d="M14 1v8M11 3v6M8 5v4M5 6v3M2 7v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <svg viewBox="0 0 22 10" fill="none">
          <rect x="1" y="1" width="17" height="8" rx="2" stroke="currentColor" stroke-width="1"/>
          <rect x="2.5" y="2.5" width="14" height="5" rx="1" fill="currentColor"/>
          <rect x="19" y="3.5" width="1.5" height="3" rx="0.5" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-title">
        <span>Matrix</span><span class="sep">·</span><span class="op">k</span><span>Scalar</span>
      </div>
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 16V4M6 10l6-6 6 6M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- SIZE -->
    <div class="size-bar">
      <span class="size-label">size</span>
      <div class="size-ctrl">
        <button class="size-btn">−</button>
        <span class="num">4</span>
        <button class="size-btn">+</button>
        <span class="x">×</span>
        <button class="size-btn">−</button>
        <span class="num">4</span>
        <button class="size-btn">+</button>
      </div>
    </div>

    <!-- MATRIX + k -->
    <div class="matrix-row">
      <div class="matrix-card">
        <div class="matrix-header">
          <span class="matrix-label">A</span>
          <div class="matrix-actions">
            <button class="mx-act" title="Fullscreen"><svg viewBox="0 0 24 24" fill="none"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button class="mx-act" title="Copy"><svg viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button class="mx-act" title="Paste"><svg viewBox="0 0 24 24" fill="none"><rect x="6" y="4" width="12" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="M9 3h6v3H9z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
          </div>
        </div>
        <div class="matrix-grid" id="gridA"></div>
      </div>

      <div class="k-side">
        <span class="k-sign">*</span>
        <input type="text" class="k-input" placeholder="k" />
      </div>
    </div>

    <div class="solve-area">
      <button class="solve-btn">
        <span class="eq">=</span>
        <span>solve</span>
      </button>
    </div>

    <div class="home-indicator"></div>
  </div>

<script>
  const dataA = [['', '', '', ''], ['', '', '', ''], ['', '', '', ''], ['', '', '', '']];

  function fillGrid(id, data) {
    const grid = document.getElementById(id);
    if (!grid) return;
    grid.innerHTML = '';
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const val = data[r][c];
        if (val !== '' && val !== undefined && val !== null) {
          cell.textContent = val;
          cell.classList.add('filled');
        }
        grid.appendChild(cell);
      }
    }
  }
  fillGrid('gridA', dataA);

  const phone = document.getElementById('phone');
  document.getElementById('theme-toggle').addEventListener('click', e => {
    const btn = e.target.closest('button'); if (!btn) return;
    phone.classList.toggle('light', btn.dataset.theme === 'light');
    document.getElementById('theme-toggle').querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
</script>

</body>
</html>
