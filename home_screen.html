<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Home — Matrix Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* =========================================================================
     THEME
     ========================================================================= */
  :root[data-theme="dark"] {
    --bg: #0a0a0f;
    --bg-elev-1: #13131a;
    --bg-elev-2: #1a1a24;
    --bg-elev-3: #222230;
    --border: #2a2a38;
    --border-soft: #1f1f2a;
    --text: #ececf1;
    --text-dim: #9a9aae;
    --text-faint: #5c5c70;
    --brand: #8b8bff;
    --brand-glow: rgba(139, 139, 255, 0.15);

    /* Operation colors — alpha values for glow and line */
    --op-add: #67e8f9;
    --op-subtract: #22d3ee;
    --op-scalar: #06b6d4;
    --op-multiply: #fde047;
    --op-power: #fbbf24;
    --op-determinant: #ffb86e;
    --op-inverse: #fb7185;
    --op-minor: #f472b6;
    --op-cofactor: #e879f9;
    --op-adjoint: #d8b4fe;
    --op-transpose: #7dd3fc;
    --op-conjugate: #38bdf8;
    --op-sqrt: #f0abfc;
    --op-lu: #a3e635;
    --op-qr: #34d399;
    --op-cholesky: #10b981;
    --op-schur: #14b8a6;
    --op-eigendecomp: #22d3ee;
    --op-eigenvalues: #6ee7b7;
    --op-eigenvectors: #a7f3d0;
    --op-polar: #8b8bff;
    --op-svd: #c4b5fd;
    --op-rank: #f9a8d4;
    --op-equations: #fcd34d;
    --op-system: #c4b5fd;

    --icon-bg-mono: #222230;
    --icon-color-mono: #ececf1;
  }
  :root[data-theme="light"] {
    --bg: #f5f4f0;
    --bg-elev-1: #ffffff;
    --bg-elev-2: #faf9f5;
    --bg-elev-3: #edece7;
    --border: #d9d7cf;
    --border-soft: #e8e6de;
    --text: #1a1a22;
    --text-dim: #5c5c6e;
    --text-faint: #9a9aa8;
    --brand: #5c5cd6;
    --brand-glow: rgba(92, 92, 214, 0.08);

    --op-add: #0e7490;
    --op-subtract: #0891b2;
    --op-scalar: #155e75;
    --op-multiply: #a16207;
    --op-power: #b45309;
    --op-determinant: #c2410c;
    --op-inverse: #e11d48;
    --op-minor: #be185d;
    --op-cofactor: #a21caf;
    --op-adjoint: #7e22ce;
    --op-transpose: #0284c7;
    --op-conjugate: #0369a1;
    --op-sqrt: #c026d3;
    --op-lu: #65a30d;
    --op-qr: #059669;
    --op-cholesky: #047857;
    --op-schur: #0d9488;
    --op-eigendecomp: #0891b2;
    --op-eigenvalues: #0fb87a;
    --op-eigenvectors: #10b981;
    --op-polar: #5c5cd6;
    --op-svd: #7c3aed;
    --op-rank: #be185d;
    --op-equations: #a16207;
    --op-system: #7c3aed;

    --icon-bg-mono: #edece7;
    --icon-color-mono: #1a1a22;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased;
    transition: background 0.25s, color 0.25s;
  }
  body { width: 390px; margin: 0 auto; min-height: 100vh; padding-bottom: 30px; }

  /* =========================================================================
     VARIANT TOGGLE (top floating)
     ========================================================================= */
  .variant-picker {
    position: fixed; top: 0; left: 50%; transform: translateX(-195px);
    z-index: 100; width: 390px;
    display: grid; grid-template-columns: 1fr 1fr;
    padding: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .vp-row {
    display: flex; gap: 0;
  }
  .vp-row button {
    flex: 1;
    padding: 4px 0;
    background: var(--bg-elev-2); color: var(--text-dim);
    border: none; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    border-right: 1px solid var(--border-soft);
  }
  .vp-row button:last-child { border-right: none; }
  .vp-row button.active {
    background: var(--brand); color: var(--bg);
  }

  /* =========================================================================
     STATUS + NAV
     ========================================================================= */
  .status-bar {
    height: 44px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px 0 32px; font-size: 15px; font-weight: 600;
    margin-top: 22px; /* space for variant picker */
  }
  .status-bar .right { display: flex; gap: 6px; align-items: center; font-size: 13px; }

  .top-nav {
    height: 56px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    position: sticky; top: 22px; z-index: 50;
    background: var(--bg);
  }
  .logo {
    font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 700;
    letter-spacing: -0.04em; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .logo .dot {
    width: 6px; height: 6px; border-radius: 2px;
    background: var(--brand);
  }
  .nav-right { display: flex; align-items: center; gap: 4px; }
  .nav-btn {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); background: transparent; border: none; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .nav-btn:hover { background: var(--bg-elev-2); color: var(--text); }

  /* =========================================================================
     SEARCH
     ========================================================================= */
  .search-shell {
    padding: 8px 16px 14px;
    position: sticky; top: 78px; z-index: 45;
    background: var(--bg);
    border-bottom: 1px solid var(--border-soft);
  }
  .search-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    background: var(--bg-elev-2); border: 1px solid var(--border-soft);
    border-radius: 12px;
    transition: border-color 0.15s;
  }
  .search-bar:focus-within { border-color: var(--brand); }
  .search-bar svg { color: var(--text-faint); flex-shrink: 0; }
  .search-bar input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif;
  }
  .search-bar input::placeholder { color: var(--text-faint); }

  /* =========================================================================
     SECTIONS
     ========================================================================= */
  .content { padding: 18px 16px 0; }

  .section-title {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-faint);
    padding: 0 4px 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .count {
    color: var(--text-faint); opacity: 0.7;
  }
  .section { margin-bottom: 24px; }

  /* =========================================================================
     RECENT (horizontal scroll) — shown in both grid and list variants
     ========================================================================= */
  .recent-scroll {
    display: flex; gap: 10px; padding: 0 16px 2px;
    overflow-x: auto; scrollbar-width: none;
    margin: 0 -16px;
  }
  .recent-scroll::-webkit-scrollbar { display: none; }
  .recent-card {
    flex-shrink: 0; width: 118px;
    padding: 12px; border-radius: 12px;
    background: var(--bg-elev-1); border: 1px solid var(--border-soft);
    border-top: 3px solid var(--op-color, var(--brand));
    cursor: pointer;
    transition: transform 0.1s;
  }
  .recent-card:active { transform: scale(0.97); }
  .recent-card .icon {
    width: 32px; height: 32px; border-radius: 9px;
    background: var(--op-color-glow, var(--brand-glow));
    color: var(--op-color, var(--brand));
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600;
    margin-bottom: 10px;
  }
  .recent-card.mono .icon {
    background: var(--icon-bg-mono);
    color: var(--icon-color-mono);
  }
  .recent-card.mono {
    border-top-color: var(--border);
  }
  .recent-card .name {
    font-size: 12px; font-weight: 600; letter-spacing: -0.01em;
    color: var(--text); margin-bottom: 4px;
    line-height: 1.3;
  }
  .recent-card .time {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--text-faint);
  }

  /* =========================================================================
     GRID VIEW
     ========================================================================= */
  .op-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .op-grid .op-tile {
    aspect-ratio: 1;
    padding: 10px 8px;
    background: var(--bg-elev-1); border: 1px solid var(--border-soft);
    border-radius: 13px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 8px;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.15s;
    text-align: center;
  }
  .op-grid .op-tile:active { transform: scale(0.96); }
  .op-grid .icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 600;
    background: var(--op-color-glow, var(--brand-glow));
    color: var(--op-color, var(--brand));
    border: 1px solid var(--op-color-line, transparent);
  }
  .op-grid.mono .icon {
    background: var(--icon-bg-mono);
    color: var(--icon-color-mono);
    border-color: var(--border-soft);
  }
  .op-grid .name {
    font-size: 11.5px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--text); line-height: 1.25;
  }

  /* =========================================================================
     LIST VIEW
     ========================================================================= */
  .op-list {
    background: var(--bg-elev-1);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    overflow: hidden;
  }
  .op-list .op-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-soft);
    transition: background 0.1s;
  }
  .op-list .op-row:last-child { border-bottom: none; }
  .op-list .op-row:active { background: var(--bg-elev-2); }

  .op-list .icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600;
    flex-shrink: 0;
    background: var(--op-color-glow, var(--brand-glow));
    color: var(--op-color, var(--brand));
    border: 1px solid var(--op-color-line, transparent);
  }
  .op-list.mono .icon {
    background: var(--icon-bg-mono);
    color: var(--icon-color-mono);
    border-color: var(--border-soft);
  }

  .op-list .meta { flex: 1; min-width: 0; }
  .op-list .name {
    font-size: 14px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--text); line-height: 1.3;
  }
  .op-list .desc {
    font-size: 11.5px; color: var(--text-faint);
    margin-top: 2px; line-height: 1.4;
  }
  .op-list .chev { color: var(--text-faint); flex-shrink: 0; }

  /* Accent bar variant (for monochrome list with color) */
  .op-list.accent .op-row {
    border-left: 3px solid var(--op-color, transparent);
    padding-left: 11px;
  }

  /* =========================================================================
     BOTTOM ROW (footer nav shortcuts)
     ========================================================================= */
  .footer-nav {
    margin-top: 16px;
    padding: 14px 16px;
    background: var(--bg-elev-1);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .footer-nav .fn-btn {
    padding: 10px 4px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    background: transparent; border: none; cursor: pointer;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    border-radius: 8px;
    transition: background 0.1s, color 0.1s;
  }
  .footer-nav .fn-btn:hover { background: var(--bg-elev-2); color: var(--text); }
  .footer-nav .fn-btn svg { color: var(--text-dim); }

  /* Hide sections based on variant */
  body:not(.show-recent) .section-recent { display: none; }
  body:not(.view-grid) .section-grid-wrap { display: none; }
  body:not(.view-list) .section-list-wrap { display: none; }
</style>
</head>

    </button>
    <button class="fn-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
    <button class="fn-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Rate
    </button>
    <button class="fn-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      Web
    </button>
  </div>

</div>

<script>
  // ==========================================================================
  // OPERATIONS DATA
  // Using bracketed symbols (like existing [+], [λ], [T] pattern).
  // ==========================================================================
  const operations = [
    // Arithmetic
    { key: 'add',         name: 'Matrix addition',          short: 'Addition',      symbol: '+',    category: 'arithmetic', color: 'add', desc: 'A + B' },
    { key: 'subtract',    name: 'Matrix subtraction',       short: 'Subtraction',   symbol: '−',    category: 'arithmetic', color: 'subtract', desc: 'A − B' },
    { key: 'scalar',      name: 'Multiply by a scalar',     short: 'By scalar',     symbol: 'k',    category: 'arithmetic', color: 'scalar', desc: 'k · A' },
    { key: 'multiply',    name: 'Matrix multiplication',    short: 'Multiply',      symbol: '×',    category: 'arithmetic', color: 'multiply', desc: 'A · B' },
    { key: 'power',       name: 'Power of a matrix',        short: 'Power',         symbol: 'Aⁿ',   category: 'arithmetic', color: 'power', desc: 'A raised to n' },
    // Properties
    { key: 'determinant', name: 'Matrix determinant',       short: 'Determinant',   symbol: 'det',  category: 'properties', color: 'determinant', desc: 'Scalar from square matrix' },
    { key: 'inverse',     name: 'Matrix inverse',           short: 'Inverse',       symbol: 'A⁻¹',  category: 'properties', color: 'inverse', desc: 'A · A⁻¹ = I' },
    { key: 'minor',       name: 'Matrix minor',             short: 'Minor',         symbol: 'Mᵢⱼ',  category: 'properties', color: 'minor', desc: 'Sub-determinant' },
    { key: 'cofactor',    name: 'Matrix cofactor',          short: 'Cofactor',      symbol: 'Cᵢⱼ',  category: 'properties', color: 'cofactor', desc: 'Signed minor' },
    { key: 'adjoint',     name: 'Matrix adjoint',           short: 'Adjoint',       symbol: 'adj',  category: 'properties', color: 'adjoint', desc: 'Transpose of cofactor' },
    { key: 'rank',        name: 'Rank of matrix',           short: 'Rank',          symbol: 'r',    category: 'properties', color: 'rank', desc: 'Linearly independent rows' },
    // Transformations
    { key: 'transpose',   name: 'Transpose matrix',         short: 'Transpose',     symbol: 'Aᵀ',   category: 'transforms', color: 'transpose', desc: 'Flip across diagonal' },
    { key: 'conjugate',   name: 'Conjugate matrix',         short: 'Conjugate',     symbol: 'Ā',    category: 'transforms', color: 'conjugate', desc: 'Complex conjugate' },
    { key: 'sqrt',        name: 'Square root',              short: 'Square root',   symbol: '√A',   category: 'transforms', color: 'sqrt', desc: 'S · S = A' },
    // Decompositions
    { key: 'lu',          name: 'LU decomposition',         short: 'LU',            symbol: 'LU',   category: 'decomp', color: 'lu', desc: 'A = L · U' },
    { key: 'qr',          name: 'QR decomposition',         short: 'QR',            symbol: 'QR',   category: 'decomp', color: 'qr', desc: 'A = Q · R' },
    { key: 'cholesky',    name: 'Cholesky decomposition',   short: 'Cholesky',      symbol: 'LL',   category: 'decomp', color: 'cholesky', desc: 'A = L · Lᵀ' },
    { key: 'schur',       name: 'Schur Decomposition',      short: 'Schur',         symbol: 'QT',   category: 'decomp', color: 'schur', desc: 'A = Q · T · Q⁻¹' },
    { key: 'eigendecomp', name: 'Eigendecomposition',       short: 'Eigendecomp',   symbol: 'PDP',  category: 'decomp', color: 'eigendecomp', desc: 'A = P · D · P⁻¹' },
    { key: 'polar',       name: 'Polar decomposition',      short: 'Polar',         symbol: 'QH',   category: 'decomp', color: 'polar', desc: 'A = Q · H' },
    { key: 'svd',         name: 'Singular Value Decomposition', short: 'SVD',       symbol: 'σ',    category: 'decomp', color: 'svd', desc: 'A = U · Σ · Vᵀ' },
    // Eigen
    { key: 'eigenvalues', name: 'Eigenvalues',              short: 'Eigenvalues',   symbol: 'λ',    category: 'eigen', color: 'eigenvalues', desc: 'Ax = λx' },
    { key: 'eigenvectors',name: 'Eigenvectors',             short: 'Eigenvectors',  symbol: 'v',    category: 'eigen', color: 'eigenvectors', desc: 'Ax = λx' },
    // Equations
    { key: 'matrix-eq',   name: 'Matrix equations',         short: 'Matrix eq.',    symbol: 'AX=B', category: 'equations', color: 'equations', desc: 'Solve for X' },
    { key: 'system-eq',   name: 'System of linear equations', short: 'Linear sys.', symbol: '{',   category: 'equations', color: 'system', desc: 'Gauss, Cramer…' },
  ];

  // Recent (fake — last used 5)
  const recent = [
    { key: 'lu', time: '13:19' },
    { key: 'determinant', time: '13:19' },
    { key: 'multiply', time: '13:19' },
    { key: 'add', time: '11:50' },
    { key: 'polar', time: 'yesterday' },
  ];

  // ==========================================================================
  // RENDER
  // ==========================================================================
  function renderGrid() {
    const cats = ['arithmetic', 'properties', 'transforms', 'decomp', 'eigen', 'equations'];
    cats.forEach(cat => {
      const container = document.querySelector(`.op-grid[data-cat="${cat}"]`);
      container.innerHTML = '';
      operations.filter(o => o.category === cat).forEach(op => {
        const tile = document.createElement('div');
        tile.className = 'op-tile';
        tile.innerHTML = `
          <div class="icon">${op.symbol}</div>
          <div class="name">${op.short}</div>
        `;
        tile.style.setProperty('--op-color', `var(--op-${op.color})`);
        tile.querySelector('.icon').style.setProperty('--op-color', `var(--op-${op.color})`);
        tile.querySelector('.icon').style.setProperty('--op-color-glow', `color-mix(in srgb, var(--op-${op.color}) 14%, transparent)`);
        tile.querySelector('.icon').style.setProperty('--op-color-line', `color-mix(in srgb, var(--op-${op.color}) 25%, transparent)`);
        container.appendChild(tile);
      });
    });
  }

  function renderList() {
    const cats = ['arithmetic', 'properties', 'transforms', 'decomp', 'eigen', 'equations'];
    cats.forEach(cat => {
      const container = document.querySelector(`.op-list[data-cat="${cat}"]`);
      container.innerHTML = '';
      operations.filter(o => o.category === cat).forEach(op => {
        const row = document.createElement('div');
        row.className = 'op-row';
        row.innerHTML = `
          <div class="icon">${op.symbol}</div>
          <div class="meta">
            <div class="name">${op.name}</div>
            <div class="desc">${op.desc}</div>
          </div>
          <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        `;
        row.style.setProperty('--op-color', `var(--op-${op.color})`);
        row.querySelector('.icon').style.setProperty('--op-color', `var(--op-${op.color})`);
        row.querySelector('.icon').style.setProperty('--op-color-glow', `color-mix(in srgb, var(--op-${op.color}) 14%, transparent)`);
        row.querySelector('.icon').style.setProperty('--op-color-line', `color-mix(in srgb, var(--op-${op.color}) 25%, transparent)`);
        container.appendChild(row);
      });
    });
  }

  function renderRecent() {
    const container = document.getElementById('recent-scroll');
    container.innerHTML = '';
    recent.forEach(r => {
      const op = operations.find(o => o.key === r.key);
      if (!op) return;
      const card = document.createElement('div');
      card.className = 'recent-card';
      card.innerHTML = `
        <div class="icon">${op.symbol}</div>
        <div class="name">${op.short}</div>
        <div class="time">${r.time}</div>
      `;
      card.style.setProperty('--op-color', `var(--op-${op.color})`);
      card.querySelector('.icon').style.setProperty('--op-color', `var(--op-${op.color})`);
      card.querySelector('.icon').style.setProperty('--op-color-glow', `color-mix(in srgb, var(--op-${op.color}) 14%, transparent)`);
      container.appendChild(card);
    });
  }

  // ==========================================================================
  // VARIANT SWITCHING
  // ==========================================================================
  const body = document.body;

  function applyVariant(dim, val) {
    if (dim === 'view') {
      body.classList.toggle('view-grid', val === 'grid');
      body.classList.toggle('view-list', val === 'list');
    } else if (dim === 'color') {
      body.classList.toggle('colored', val === 'colored');
      body.classList.toggle('mono', val === 'mono');
      // Apply to op-grid/list roots
      document.querySelectorAll('.op-grid, .op-list, .recent-card').forEach(el => {
        el.classList.toggle('mono', val === 'mono');
      });
    } else if (dim === 'recent') {
      body.classList.toggle('show-recent', val === 'with');
    }
  }

  document.querySelectorAll('.variant-picker button').forEach(btn => {
    btn.addEventListener('click', () => {
      const dim = btn.dataset.dim;
      const val = btn.dataset.val;
      document.querySelectorAll(`.variant-picker button[data-dim="${dim}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyVariant(dim, val);
    });
  });

  // ==========================================================================
  // SEARCH
  // ==========================================================================
  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    if (!q) {
      document.querySelectorAll('.op-tile, .op-row, .section').forEach(el => el.style.display = '');
      return;
    }
    document.querySelectorAll('.op-tile, .op-row').forEach(el => {
      const name = el.querySelector('.name').textContent.toLowerCase();
      const descEl = el.querySelector('.desc');
      const desc = descEl ? descEl.textContent.toLowerCase() : '';
      el.style.display = (name.includes(q) || desc.includes(q)) ? '' : 'none';
    });
    // Hide empty sections
    document.querySelectorAll('.op-grid, .op-list').forEach(container => {
      const hasVisible = [...container.children].some(c => c.style.display !== 'none');
      container.closest('.section').style.display = hasVisible ? '' : 'none';
    });
  });

  // ==========================================================================
  // THEME TOGGLE
  // ==========================================================================
  const SUN = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  const MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('theme-icon').innerHTML = t === 'dark' ? MOON : SUN;
  }
  setTheme('dark');
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    setTheme(current === 'dark' ? 'light' : 'dark');
  });

  // ==========================================================================
  // INIT
  // ==========================================================================
  renderGrid();
  renderList();
  renderRecent();
</script>

</body>
</html>
