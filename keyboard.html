<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Matrix · Custom Keyboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&family=STIX+Two+Math&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-elev: #12121a;
    --bg-elev-2: #191922;
    --purple: #8b8bff;
    --purple-soft: rgba(139, 139, 255, 0.12);
    --teal: #6ee7b7;
    --teal-soft: rgba(110, 231, 183, 0.12);
    --red: #ff7a7a;
    --red-soft: rgba(255, 122, 122, 0.12);
    --text: #ededf2;
    --text-dim: #8a8a99;
    --text-faint: #4a4a5a;
    --border: #232330;
    --border-soft: #1c1c28;
    --solve-text: #0a0a0f;
    --cell-empty: #4a4a5a;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(139, 139, 255, 0.08), 0 10px 40px rgba(0, 0, 0, 0.6);
  }

  .phone.light {
    --bg: #f5f4f0;
    --bg-elev: #ffffff;
    --bg-elev-2: #f5f4f0;
    --purple: #5c5cd6;
    --purple-soft: rgba(92, 92, 214, 0.10);
    --teal: #0fb87a;
    --teal-soft: rgba(15, 184, 122, 0.10);
    --red: #e04a4a;
    --red-soft: rgba(224, 74, 74, 0.08);
    --text: #1a1a22;
    --text-dim: #6a6a78;
    --text-faint: #b8b8c2;
    --border: #e6e5dd;
    --border-soft: #ecebe4;
    --solve-text: #ffffff;
    --cell-empty: #c8c7bf;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(92, 92, 214, 0.12), 0 10px 40px rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 14px;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .toggle {
    display: inline-flex;
    background: #1a1a22;
    border: 1px solid #2a2a35;
    border-radius: 999px;
    padding: 4px;
    gap: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .toggle button {
    background: transparent;
    border: 0;
    color: #8a8a99;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    transition: all 0.25s ease;
  }
  .toggle button.active {
    background: #8b8bff;
    color: #0a0a0f;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    aspect-ratio: 390 / 844;
    background: var(--bg);
    border-radius: 48px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-phone);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 28px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    position: relative;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; color: var(--text-dim); }
  .status-icons svg { width: 16px; height: 10px; }
  .island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 11;
  }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 14px;
    gap: 12px;
  }
  .nav-btn {
    width: 38px; height: 38px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    cursor: pointer;
  }
  .nav-btn svg { width: 18px; height: 18px; }
  .nav-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-title .sep { color: var(--text-faint); font-family: 'DM Mono', monospace; }
  .nav-title .op { color: var(--purple); font-family: 'DM Mono', monospace; font-size: 18px; }

  /* Matrices (compact) */
  .matrices-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    margin-top: 4px;
    margin-bottom: 14px;
  }
  .matrix-card {
    flex: 1;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px;
  }
  .matrix-card.active {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px var(--purple-soft);
  }
  .matrix-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding: 0 2px;
  }
  .matrix-label {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--purple);
    letter-spacing: 0.5px;
  }
  .matrix-card.is-b .matrix-label { color: var(--teal); }
  .matrix-actions { display: flex; gap: 4px; }
  .mx-act {
    width: 22px; height: 22px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .mx-act svg { width: 10px; height: 10px; }
  .matrix-grid {
    display: grid;
    gap: 4px;
    padding: 2px;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
  }
  .cell {
    aspect-ratio: 1;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    position: relative;
  }
  .cell:empty::before { content: '·'; color: var(--cell-empty); opacity: 0.6; }
  .cell.filled { color: var(--text); }
  .cell.active {
    border-color: var(--purple);
    background: var(--purple-soft);
    color: var(--purple);
  }
  .cell.active::after {
    content: '';
    position: absolute;
    width: 2px;
    height: 60%;
    background: var(--purple);
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  .op-sign {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    color: var(--text-dim);
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }

  /* Solve */
  .solve-area {
    padding: 10px 16px 12px;
  }
  .solve-btn {
    width: 100%;
    height: 52px;
    background: var(--purple);
    color: var(--solve-text);
    border: 0;
    border-radius: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(139, 139, 255, 0.3);
  }
  .phone.light .solve-btn {
    box-shadow: 0 10px 30px rgba(92, 92, 214, 0.35);
  }
  .solve-btn .eq { opacity: 0.6; }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: var(--text);
    border-radius: 3px;
    opacity: 0.9;
    z-index: 30;
  }

  .spacer { flex: 1; }

  /* ============ KEYBOARD ============ */
  .keyboard {
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 12px 10px 28px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    animation: kbIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes kbIn {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .k {
    height: 46px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.08s ease, border-color 0.15s ease, background 0.15s ease;
    user-select: none;
    position: relative;
  }
  .k:hover { border-color: var(--purple); }
  .k:active { transform: scale(0.94); background: var(--bg); }

  .k.italic {
    font-family: 'STIX Two Math', 'Cambria Math', 'Times New Roman', serif;
    font-style: italic;
    font-size: 19px;
    font-weight: 500;
  }
  .k.accent { color: var(--purple); border-color: rgba(139, 139, 255, 0.3); }
  .phone.light .k.accent { border-color: rgba(92, 92, 214, 0.3); }
  .k.danger {
    color: var(--red);
    border-color: rgba(255, 122, 122, 0.3);
    background: var(--red-soft);
  }
  .phone.light .k.danger { border-color: rgba(224, 74, 74, 0.3); }
  .k.nav svg { width: 14px; height: 14px; color: var(--text-dim); }
  .k.nav:hover svg { color: var(--purple); }
  .k.wide-2 { grid-column: span 2; }

  /* CLR & ⌫ labels */
  .k .lbl-sm {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  .k .k-icon-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .k .k-icon-group svg { width: 14px; height: 14px; }

  /* Switcher (◯●) key */
  .k.switcher {
    background: transparent;
  }
  .k.switcher .dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .k.switcher .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    border: 1.5px solid var(--text-dim);
    background: transparent;
    transition: all 0.2s ease;
  }
  .k.switcher .dot.on {
    background: var(--purple);
    border-color: var(--purple);
    box-shadow: 0 0 8px rgba(139, 139, 255, 0.5);
  }

  /* Power / fraction glyphs for symbolic keyboard */
  .glyph-power, .glyph-frac, .glyph-pow-n {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 1px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    position: relative;
  }
  .glyph-power .base,
  .glyph-pow-n .base,
  .glyph-frac .num,
  .glyph-frac .den {
    width: 14px;
    height: 14px;
    border: 1px dashed var(--text-dim);
    border-radius: 3px;
    display: inline-block;
  }
  .glyph-power {
    align-items: flex-end;
  }
  .glyph-power .exp {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    margin-bottom: 8px;
    margin-left: -2px;
    line-height: 1;
  }
  .glyph-pow-n .exp {
    width: 10px;
    height: 10px;
    border: 1px dashed var(--text-dim);
    border-radius: 2px;
    margin-bottom: 10px;
    margin-left: -2px;
  }
  .glyph-frac {
    flex-direction: column;
    gap: 2px;
  }
  .glyph-frac .num,
  .glyph-frac .den {
    width: 11px;
    height: 9px;
  }
  .glyph-frac .bar {
    width: 14px;
    height: 1px;
    background: var(--text-dim);
  }

  /* State visibility */
  .kb { display: none; }
  .phone[data-kb="num"] .kb.kb-num { display: grid; }
  .phone[data-kb="sym"] .kb.kb-sym { display: grid; }

  .controls-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #5a5a68;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>

  <div class="controls-hint">keyboard type ↓ · theme ↓</div>
  <div class="controls">
    <div class="toggle" id="kb-toggle">
      <button data-kb="num" class="active">Numeric</button>
      <button data-kb="sym">Symbolic</button>
    </div>
    <div class="toggle" id="theme-toggle">
      <button data-theme="dark" class="active">Dark</button>
      <button data-theme="light">Light</button>
    </div>
  </div>

  <div class="phone" id="phone" data-kb="num">
    <div class="island"></div>

    <div class="status-bar">
      <span>06:45</span>
      <div class="status-icons">
        <span style="font-size:13px;letter-spacing:.5px;">•••</span>
        <span style="font-family:'DM Mono';font-size:9px;letter-spacing:1px;color:var(--text-dim);">LTE</span>
        <svg viewBox="0 0 22 10" fill="none">
          <rect x="1" y="1" width="17" height="8" rx="2" stroke="currentColor" stroke-width="1"/>
          <rect x="2.5" y="2.5" width="3" height="5" rx="1" fill="currentColor"/>
          <rect x="19" y="3.5" width="1.5" height="3" rx="0.5" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- Nav -->
    <div class="nav">
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-title">
        <span>Matrix</span><span class="sep">·</span><span class="op">+</span><span>Addition</span>
      </div>
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 16V4M6 10l6-6 6 6M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- Compact matrices on top (visible with keyboard) -->
    <div class="matrices-row">
      <div class="matrix-card active">
        <div class="matrix-header">
          <span class="matrix-label">A</span>
          <div class="matrix-actions">
            <button class="mx-act"><svg viewBox="0 0 24 24" fill="none"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button class="mx-act"><svg viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
          </div>
        </div>
        <div class="matrix-grid" id="gridA"></div>
      </div>

      <div class="op-sign">+</div>

      <div class="matrix-card is-b">
        <div class="matrix-header">
          <span class="matrix-label">B</span>
          <div class="matrix-actions">
            <button class="mx-act"><svg viewBox="0 0 24 24" fill="none"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button class="mx-act"><svg viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
          </div>
        </div>
        <div class="matrix-grid" id="gridB"></div>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- Solve -->
    <div class="solve-area">
      <button class="solve-btn"><span class="eq">=</span><span>solve</span></button>
    </div>

    <!-- ====== KEYBOARD: NUMERIC ======
         Layout (6 cols × 4 rows), matches original exactly:
         Row 1: 1 2 3 CLR [⌫        ]
         Row 2: 4 5 6 ← ▲ →
         Row 3: 7 8 9 ◀ ▼ ▶
         Row 4: . 0 − [switch ◯●] [∨   ]
    -->
    <div class="kb kb-num keyboard">
      <!-- Row 1 -->
      <div class="k">1</div>
      <div class="k">2</div>
      <div class="k">3</div>
      <div class="k"><span class="lbl-sm">CLR</span></div>
      <div class="k danger wide-2">
        <div class="k-icon-group">
          <svg viewBox="0 0 24 24" fill="none"><path d="M21 5H8l-5 7 5 7h13a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M12 9l4 4m0-4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
      </div>

      <!-- Row 2 -->
      <div class="k">4</div>
      <div class="k">5</div>
      <div class="k">6</div>
      <div class="k nav"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="k nav"><svg viewBox="0 0 24 24" fill="none"><path d="M6 15l6-6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="k nav"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>

      <!-- Row 3 -->
      <div class="k">7</div>
      <div class="k">8</div>
      <div class="k">9</div>
      <div class="k nav"><svg viewBox="0 0 24 24" fill="#currentColor"><path d="M14 6l-6 6 6 6" fill="currentColor"/></svg></div>
      <div class="k nav"><svg viewBox="0 0 24 24"><path d="M18 10l-6 6-6-6" fill="currentColor"/></svg></div>
      <div class="k nav"><svg viewBox="0 0 24 24"><path d="M10 6l6 6-6 6" fill="currentColor"/></svg></div>

      <!-- Row 4 -->
      <div class="k">.</div>
      <div class="k">0</div>
      <div class="k accent">−</div>
      <!-- Keyboard type switcher -->
      <div class="k switcher" data-switcher="to-sym" title="Switch to symbolic">
        <div class="dots">
          <span class="dot on"></span>
          <span class="dot"></span>
        </div>
      </div>
      <!-- Collapse keyboard (∨) -->
      <div class="k nav wide-2" title="Hide keyboard">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <!-- ====== KEYBOARD: SYMBOLIC ======
         Layout (matches 2nd original screenshot):
         Row 1: a b c CLR [⌫        ]
         Row 2: x y z ← ▲ →
         Row 3: □² □^□ i ◀ ▼ ▶
         Row 4: + □/□ − [switch ●◯] [∨  ]
    -->
    <div class="kb kb-sym keyboard">
      <!-- Row 1 -->
      <div class="k italic">a</div>
      <div class="k italic">b</div>
      <div class="k italic">c</div>
      <div class="k"><span class="lbl-sm">CLR</span></div>
      <div class="k danger wide-2">
        <div class="k-icon-group">
          <svg viewBox="0 0 24 24" fill="none"><path d="M21 5H8l-5 7 5 7h13a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M12 9l4 4m0-4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
      </div>

      <!-- Row 2 -->
      <div class="k italic">x</div>
      <div class="k italic">y</div>
      <div class="k italic">z</div>
      <div class="k nav"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="k nav"><svg viewBox="0 0 24 24" fill="none"><path d="M6 15l6-6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="k nav"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>

      <!-- Row 3 -->
      <div class="k">
        <span class="glyph-power"><span class="base"></span><span class="exp">2</span></span>
      </div>
      <div class="k">
        <span class="glyph-pow-n"><span class="base"></span><span class="exp"></span></span>
      </div>
      <div class="k italic">i</div>
      <div class="k nav"><svg viewBox="0 0 24 24"><path d="M14 6l-6 6 6 6" fill="currentColor"/></svg></div>
      <div class="k nav"><svg viewBox="0 0 24 24"><path d="M18 10l-6 6-6-6" fill="currentColor"/></svg></div>
      <div class="k nav"><svg viewBox="0 0 24 24"><path d="M10 6l6 6-6 6" fill="currentColor"/></svg></div>

      <!-- Row 4 -->
      <div class="k accent">+</div>
      <div class="k">
        <span class="glyph-frac"><span class="num"></span><span class="bar"></span><span class="den"></span></span>
      </div>
      <div class="k accent">−</div>
      <!-- Switcher (now second dot is on) -->
      <div class="k switcher" data-switcher="to-num" title="Switch to numeric">
        <div class="dots">
          <span class="dot"></span>
          <span class="dot on"></span>
        </div>
      </div>
      <!-- Collapse -->
      <div class="k nav wide-2" title="Hide keyboard">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>

<script>
  const sampleA = [
    [4, 2, 1, 3],
    [0, 1,-1, 2],
    [3, 5, 2, 1],
    [1, 0, 4, '']
  ];
  const empty = [['','','',''],['','','',''],['','','',''],['','','','']];

  function fillGrid(id, data, activeRow, activeCol) {
    const grid = document.getElementById(id);
    if (!grid) return;
    grid.innerHTML = '';
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const val = data[r][c];
        if (val !== '' && val !== undefined && val !== null) {
          cell.textContent = val;
          cell.classList.add('filled');
        }
        if (r === activeRow && c === activeCol) {
          cell.classList.add('active');
          cell.textContent = '';
        }
        grid.appendChild(cell);
      }
    }
  }
  fillGrid('gridA', sampleA, 3, 3);
  fillGrid('gridB', empty, -1, -1);

  const phone = document.getElementById('phone');
  const kbToggle = document.getElementById('kb-toggle');
  const themeToggle = document.getElementById('theme-toggle');

  kbToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    phone.dataset.kb = btn.dataset.kb;
    kbToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });

  themeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    phone.classList.remove('light');
    if (btn.dataset.theme === 'light') phone.classList.add('light');
    themeToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });

  // In-phone switcher keys also toggle
  phone.addEventListener('click', (e) => {
    const sw = e.target.closest('[data-switcher]');
    if (!sw) return;
    const target = sw.dataset.switcher === 'to-sym' ? 'sym' : 'num';
    phone.dataset.kb = target;
    kbToggle.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', b.dataset.kb === target);
    });
  });
</script>

</body>
</html>
