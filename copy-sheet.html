<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Copy Sheet · Component</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-elev: #12121a;
    --bg-elev-2: #191922;
    --purple: #8b8bff;
    --purple-soft: rgba(139, 139, 255, 0.12);
    --red: #ff7a7a;
    --red-soft: rgba(255, 122, 122, 0.12);
    --text: #ededf2;
    --text-dim: #8a8a99;
    --text-faint: #4a4a5a;
    --border: #232330;
    --border-soft: #1c1c28;
    --overlay-bg: rgba(0, 0, 0, 0.6);
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(139, 139, 255, 0.08), 0 10px 40px rgba(0, 0, 0, 0.6);
  }

  .phone.light {
    --bg: #f5f4f0;
    --bg-elev: #ffffff;
    --bg-elev-2: #f5f4f0;
    --purple: #5c5cd6;
    --purple-soft: rgba(92, 92, 214, 0.10);
    --red: #e04a4a;
    --red-soft: rgba(224, 74, 74, 0.08);
    --text: #1a1a22;
    --text-dim: #6a6a78;
    --text-faint: #b8b8c2;
    --border: #e6e5dd;
    --border-soft: #ecebe4;
    --overlay-bg: rgba(30, 30, 40, 0.35);
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(92, 92, 214, 0.12), 0 10px 40px rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 14px;
  }

  .toggle {
    display: inline-flex;
    background: #1a1a22;
    border: 1px solid #2a2a35;
    border-radius: 999px;
    padding: 4px;
    gap: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .toggle button {
    background: transparent; border: 0;
    color: #8a8a99;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit; letter-spacing: inherit; text-transform: inherit;
    transition: all 0.25s ease;
  }
  .toggle button.active { background: #8b8bff; color: #0a0a0f; }

  .phone {
    width: 100%;
    max-width: 390px;
    aspect-ratio: 390 / 844;
    background: var(--bg);
    border-radius: 48px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-phone);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
  }

  .island {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 11;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 28px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; color: var(--text-dim); }
  .status-icons svg { width: 16px; height: 10px; }

  /* Dim background (imitating page underneath) */
  .bg-hint {
    position: absolute;
    inset: 0;
    padding: 80px 20px 100px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    opacity: 0.35;
    filter: blur(0.5px);
    pointer-events: none;
  }
  .bg-block {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    height: 60px;
  }
  .bg-block.tall { height: 160px; }

  /* Modal overlay */
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: var(--overlay-bg);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 15;
  }

  /* Sheet */
  .sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--bg-elev);
    border-radius: 24px 24px 0 0;
    border: 1px solid var(--border);
    border-bottom: 0;
    padding: 10px 20px 30px;
    max-height: 72%;
    overflow-y: auto;
    z-index: 16;
    box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.3);
  }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--text-faint);
    border-radius: 2px;
    margin: 0 auto 14px;
    opacity: 0.6;
  }
  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .sheet-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.4px;
    color: var(--text);
  }
  .sheet-close {
    width: 32px; height: 32px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sheet-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }

  .slot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .slot:hover {
    border-color: var(--purple);
    background: var(--purple-soft);
  }
  .slot.empty { border-style: dashed; }
  .slot-left { display: flex; align-items: center; gap: 12px; }
  .slot-idx {
    width: 34px; height: 34px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--purple);
    font-weight: 500;
  }
  .slot.empty .slot-idx { color: var(--text-faint); }
  .slot-info .slot-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .slot-info .slot-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }
  .slot.empty .slot-name { color: var(--text-faint); }
  .slot-right { display: flex; align-items: center; gap: 10px; }
  .slot-size {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    padding: 4px 8px;
    background: var(--bg-elev-2);
    border-radius: 6px;
  }
  .slot-trash {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 7px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .slot-trash:hover {
    color: var(--red);
    border-color: var(--red);
    background: var(--red-soft);
  }
  .slot-trash svg { width: 13px; height: 13px; }

  .home-indicator {
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 134px; height: 5px;
    background: var(--text);
    border-radius: 3px;
    opacity: 0.9;
    z-index: 30;
  }

  .controls-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #5a5a68;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>

  <div class="controls-hint">copy sheet · component</div>
  <div class="toggle" id="theme-toggle">
    <button data-theme="dark" class="active">Dark</button>
    <button data-theme="light">Light</button>
  </div>

  <div class="phone" id="phone">
    <div class="island"></div>

    <div class="status-bar">
      <span>00:38</span>
      <div class="status-icons">
        <span style="font-size:13px;letter-spacing:.5px;">•••</span>
        <svg viewBox="0 0 16 10" fill="none"><path d="M14 1v8M11 3v6M8 5v4M5 6v3M2 7v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <svg viewBox="0 0 22 10" fill="none">
          <rect x="1" y="1" width="17" height="8" rx="2" stroke="currentColor" stroke-width="1"/>
          <rect x="2.5" y="2.5" width="14" height="5" rx="1" fill="currentColor"/>
          <rect x="19" y="3.5" width="1.5" height="3" rx="0.5" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- Faded background hint (what's underneath) -->
    <div class="bg-hint">
      <div class="bg-block"></div>
      <div class="bg-block tall"></div>
    </div>

    <div class="modal-overlay"></div>

    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div class="sheet-title">Copy to slot</div>
        <button class="sheet-close">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="sheet-sub">// choose where to store the copied matrix</div>

      <div class="slot">
        <div class="slot-left">
          <div class="slot-idx">01</div>
          <div class="slot-info">
            <div class="slot-name">Matrix_1</div>
            <div class="slot-meta">26 sep 2025 · 23:08</div>
          </div>
        </div>
        <div class="slot-right">
          <span class="slot-size">4×4</span>
          <button class="slot-trash"><svg viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        </div>
      </div>

      <div class="slot empty">
        <div class="slot-left">
          <div class="slot-idx">02</div>
          <div class="slot-info">
            <div class="slot-name">Matrix_2</div>
            <div class="slot-meta">empty · tap to store</div>
          </div>
        </div>
        <div class="slot-right"><span class="slot-size">—</span></div>
      </div>

      <div class="slot empty">
        <div class="slot-left">
          <div class="slot-idx">03</div>
          <div class="slot-info">
            <div class="slot-name">Matrix_3</div>
            <div class="slot-meta">empty · tap to store</div>
          </div>
        </div>
        <div class="slot-right"><span class="slot-size">—</span></div>
      </div>

      <div class="slot empty">
        <div class="slot-left">
          <div class="slot-idx">04</div>
          <div class="slot-info">
            <div class="slot-name">Matrix_4</div>
            <div class="slot-meta">empty · tap to store</div>
          </div>
        </div>
        <div class="slot-right"><span class="slot-size">—</span></div>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>

<script>
  const phone = document.getElementById('phone');
  const themeToggle = document.getElementById('theme-toggle');
  themeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    phone.classList.remove('light');
    if (btn.dataset.theme === 'light') phone.classList.add('light');
    themeToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
</script>

</body>
</html>
