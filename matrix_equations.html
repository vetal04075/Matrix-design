<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Matrix equations · HMLA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-elev: #12121a;
    --bg-elev-2: #191922;
    --purple: #8b8bff;
    --purple-soft: rgba(139, 139, 255, 0.12);
    --teal: #6ee7b7;
    --teal-soft: rgba(110, 231, 183, 0.12);
    --red: #ff7a7a;
    --red-soft: rgba(255, 122, 122, 0.12);
    --text: #ededf2;
    --text-dim: #8a8a99;
    --text-faint: #4a4a5a;
    --border: #232330;
    --border-soft: #1c1c28;
    --solve-text: #0a0a0f;
    --cell-empty: #4a4a5a;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(139, 139, 255, 0.08), 0 10px 40px rgba(0, 0, 0, 0.6);

    /* matrix equations op color = violet */
    --op-color: #c4b5fd;
    --op-color-soft: rgba(196, 181, 253, 0.12);
    --op-color-line: rgba(196, 181, 253, 0.35);

    /* matrix identity colors */
    --col-a: var(--purple);
    --col-a-soft: var(--purple-soft);
    --col-b: var(--teal);
    --col-b-soft: var(--teal-soft);
    --col-c: #fde047;
    --col-c-soft: rgba(253, 224, 71, 0.14);
    --col-c-line: rgba(253, 224, 71, 0.35);

    --col-x: var(--op-color);
  }

  .phone.light {
    --bg: #f5f4f0;
    --bg-elev: #ffffff;
    --bg-elev-2: #f5f4f0;
    --purple: #5c5cd6;
    --purple-soft: rgba(92, 92, 214, 0.10);
    --teal: #0fb87a;
    --teal-soft: rgba(15, 184, 122, 0.10);
    --red: #e04a4a;
    --red-soft: rgba(224, 74, 74, 0.08);
    --text: #1a1a22;
    --text-dim: #6a6a78;
    --text-faint: #b8b8c2;
    --border: #e6e5dd;
    --border-soft: #ecebe4;
    --solve-text: #ffffff;
    --cell-empty: #c8c7bf;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(92, 92, 214, 0.12), 0 10px 40px rgba(0, 0, 0, 0.4);

    --op-color: #7c3aed;
    --op-color-soft: rgba(124, 58, 237, 0.08);
    --op-color-line: rgba(124, 58, 237, 0.35);

    --col-c: #a16207;
    --col-c-soft: rgba(161, 98, 7, 0.08);
    --col-c-line: rgba(161, 98, 7, 0.35);

    --col-x: var(--op-color);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; flex-direction: column; align-items: center;
    padding: 24px; gap: 14px;
  }

  .controls-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: #5a5a68;
    letter-spacing: 1px; text-transform: uppercase;
    text-align: center;
  }

  .toggle {
    display: inline-flex;
    background: #1a1a22; border: 1px solid #2a2a35;
    border-radius: 999px; padding: 4px; gap: 2px;
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .toggle button {
    background: transparent; border: 0;
    color: #8a8a99; padding: 8px 14px;
    border-radius: 999px; cursor: pointer;
    font: inherit; letter-spacing: inherit; text-transform: inherit;
    transition: all 0.25s ease;
  }
  .toggle button.active { background: #8b8bff; color: #0a0a0f; }

  /* PHONE */
  .phone {
    width: 100%; max-width: 390px;
    aspect-ratio: 390 / 844;
    background: var(--bg); border-radius: 48px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-phone);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
  }
  .island {
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000; border-radius: 20px; z-index: 11;
  }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 28px 0;
    font-size: 15px; font-weight: 600;
    flex-shrink: 0;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; color: var(--text-dim); }
  .status-icons svg { width: 16px; height: 10px; }

  /* NAV */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 14px; gap: 12px;
    flex-shrink: 0;
  }
  .nav-btn {
    width: 38px; height: 38px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .nav-btn:hover { border-color: var(--purple); background: var(--purple-soft); }
  .nav-btn svg { width: 18px; height: 18px; }
  .nav-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 500;
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-title .sep { color: var(--text-faint); font-family: 'DM Mono', monospace; }
  .nav-title .op {
    color: var(--op-color);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* CONFIG */
  .config-card {
    margin: 4px 16px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px 14px;
    flex-shrink: 0;
    display: flex; flex-direction: column;
  }
  .config-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-soft);
    min-height: 46px;
  }
  .config-row:last-child { border-bottom: none; }
  .config-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: -0.1px;
  }

  .stepper-row {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }
  .size-btn {
    width: 26px; height: 26px;
    border-radius: 7px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }
  .size-btn:hover { border-color: var(--purple); color: var(--purple); }
  .size-btn:active { transform: scale(0.92); }
  .stepper-row .num {
    color: var(--purple);
    font-size: 15px; font-weight: 500;
    min-width: 14px; text-align: center;
  }

  .picker-trigger {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px 6px 12px;
    background: var(--op-color-soft);
    border: 1px solid var(--op-color-line);
    border-radius: 9px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--op-color);
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .picker-trigger:hover { filter: brightness(1.1); }
  .picker-trigger svg {
    width: 12px; height: 12px;
    flex-shrink: 0;
  }

  /* =========================================================================
     EQUATION AREA
     ========================================================================= */
  .equation-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    padding: 0 16px 8px;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .equation-scroll::-webkit-scrollbar { display: none; }

  .equation-row {
    display: flex;
    align-items: stretch;
    gap: 6px;
    width: max-content;
    min-width: 100%;
    justify-content: center;
  }

  /* Matrix card */
  .matrix-card {
    flex: 0 0 auto;
    width: 180px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px;
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .matrix-card[data-matrix="A"] { border-color: color-mix(in srgb, var(--col-a) 25%, var(--border)); }
  .matrix-card[data-matrix="B"] { border-color: color-mix(in srgb, var(--col-b) 25%, var(--border)); }
  .matrix-card[data-matrix="C"] { border-color: color-mix(in srgb, var(--col-c) 25%, var(--border)); }

  .matrix-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; padding: 0 2px;
  }
  .matrix-label {
    font-family: 'DM Mono', monospace;
    font-size: 15px; font-weight: 500;
    letter-spacing: 0.5px;
    display: flex; align-items: baseline; gap: 6px;
  }
  .matrix-card[data-matrix="A"] .matrix-label { color: var(--col-a); }
  .matrix-card[data-matrix="B"] .matrix-label { color: var(--col-b); }
  .matrix-card[data-matrix="C"] .matrix-label { color: var(--col-c); }
  .matrix-label .dim {
    font-size: 10px;
    color: var(--text-faint);
    font-weight: 400;
  }
  .matrix-actions { display: flex; gap: 4px; }
  .mx-act {
    width: 22px; height: 22px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .mx-act:hover { border-color: var(--text-dim); color: var(--text); }
  .mx-act svg { width: 10px; height: 10px; }

  .matrix-grid {
    display: grid; gap: 4px; padding: 2px;
  }
  .cell {
    aspect-ratio: 1;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .cell:empty::before { content: '·'; color: var(--cell-empty); opacity: 0.6; }
  .cell.filled { color: var(--text); }

  /* Operator labels between matrices */
  .op-label {
    flex: 0 0 auto;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px;
    padding: 0 4px;
    font-family: 'DM Mono', monospace;
    min-width: 28px;
  }
  .op-label .sym {
    font-size: 16px; font-weight: 400;
    color: var(--text-dim);
  }
  .op-label .x {
    font-size: 18px; font-weight: 500;
    color: var(--col-x);
    letter-spacing: 0.5px;
    padding: 4px 9px;
    background: var(--op-color-soft);
    border: 1px solid var(--op-color-line);
    border-radius: 8px;
  }
  .op-label .eq-sym {
    font-size: 18px;
    color: var(--text);
    font-weight: 500;
  }

  /* SOLVE */
  .solve-area {
    margin-top: auto;
    padding: 14px 16px;
    border-top: 1px solid var(--border-soft);
    flex-shrink: 0;
  }
  .solve-btn {
    width: 100%; height: 56px;
    background: var(--purple);
    color: var(--solve-text);
    border: 0; border-radius: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 15px; font-weight: 500;
    letter-spacing: 0.5px;
    display: flex; align-items: center; justify-content: center; gap: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 0 30px rgba(139, 139, 255, 0.3);
  }
  .phone.light .solve-btn { box-shadow: 0 10px 30px rgba(92, 92, 214, 0.35); }
  .solve-btn:hover { filter: brightness(1.08); }
  .solve-btn:active { transform: translateY(1px); }
  .solve-btn .eq { opacity: 0.6; font-weight: 400; }

  .home-indicator {
    position: absolute;
    bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px;
    background: var(--text);
    border-radius: 3px;
    opacity: 0.9;
    z-index: 30;
  }

  /* =========================================================================
     PICKER MODAL
     ========================================================================= */
  .modal-backdrop {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: auto; }

  .picker-sheet {
    position: absolute;
    left: 12px; right: 12px; bottom: 12px;
    z-index: 25;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 8px;
    transform: translateY(calc(100% + 12px));
    transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    max-height: 70%;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .picker-sheet::-webkit-scrollbar { display: none; }
  .picker-sheet.open { transform: translateY(0); }

  .picker-header {
    padding: 10px 12px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border-soft);
  }
  .picker-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .picker-close {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .picker-close svg { width: 12px; height: 12px; }

  .picker-option {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    padding: 14px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .picker-option:hover { background: var(--bg-elev-2); }
  .picker-option.selected {
    background: var(--op-color-soft);
  }
  .picker-option-main {
    display: flex; flex-direction: column; gap: 3px;
  }
  .picker-option .formula {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .picker-option.selected .formula { color: var(--op-color); }
  .picker-option .note {
    font-family: 'DM Mono', monospace;
    font-size: 10.5px;
    color: var(--text-faint);
    letter-spacing: 0.2px;
  }
  .picker-check {
    width: 18px; height: 18px;
    color: var(--op-color);
    flex-shrink: 0;
    opacity: 0;
  }
  .picker-option.selected .picker-check { opacity: 1; }
</style>
</head>
<body>

  <div class="controls-hint">matrix equations · AX=B, XA=B, AXB=C</div>
  <div class="toggle" id="theme-toggle">
    <button data-theme="dark" class="active">Dark</button>
    <button data-theme="light">Light</button>
  </div>

  <div class="phone" id="phone">
    <div class="island"></div>

    <div class="status-bar">
      <span>11:50</span>
      <div class="status-icons">
        <span style="font-size:13px;letter-spacing:.5px;">•••</span>
        <svg viewBox="0 0 16 10" fill="none"><path d="M14 1v8M11 3v6M8 5v4M5 6v3M2 7v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <svg viewBox="0 0 22 10" fill="none">
          <rect x="1" y="1" width="17" height="8" rx="2" stroke="currentColor" stroke-width="1"/>
          <rect x="2.5" y="2.5" width="14" height="5" rx="1" fill="currentColor"/>
          <rect x="19" y="3.5" width="1.5" height="3" rx="0.5" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-title">
        <span>Matrix</span><span class="sep">·</span><span class="op" id="nav-formula">AX=B</span>
      </div>
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 16V4M6 10l6-6 6 6M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- CONFIG -->
    <div class="config-card">
      <div class="config-row">
        <span class="config-label">Matrix size</span>
        <div class="stepper-row" id="size-stepper">
          <button class="size-btn" data-delta="-1">−</button>
          <span class="num" id="size-num">4</span>
          <button class="size-btn" data-delta="1">+</button>
        </div>
      </div>

      <div class="config-row">
        <span class="config-label">Form</span>
        <div class="picker-trigger" id="form-trigger">
          <span class="value" id="form-value">A · X = B</span>
          <svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    </div>

    <!-- EQUATION -->
    <div class="equation-scroll">
      <div class="equation-row" id="equation-row">
        <!-- Dynamically rendered -->
      </div>
    </div>

    <div class="solve-area">
      <button class="solve-btn">
        <span class="eq">=</span>
        <span>solve</span>
      </button>
    </div>

    <!-- Backdrop + picker -->
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="picker-sheet" id="form-sheet">
      <div class="picker-header">
        <span class="picker-title">Select form</span>
        <button class="picker-close" data-close-picker>
          <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="picker-option" data-form="AX=B">
        <div class="picker-option-main">
          <span class="formula">A · X = B</span>
          <span class="note">solve by left-multiplying A⁻¹</span>
        </div>
        <svg class="picker-check" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="picker-option" data-form="XA=B">
        <div class="picker-option-main">
          <span class="formula">X · A = B</span>
          <span class="note">solve by right-multiplying A⁻¹</span>
        </div>
        <svg class="picker-check" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="picker-option" data-form="AXB=C">
        <div class="picker-option-main">
          <span class="formula">A · X · B = C</span>
          <span class="note">solve by A⁻¹ · C · B⁻¹</span>
        </div>
        <svg class="picker-check" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>

<script>
  const FORMS = {
    'AX=B': {
      label: 'A · X = B',
      navText: 'AX=B',
      // each element either 'A'|'B'|'C' (matrix) or an op object
      sequence: [
        { type: 'matrix', id: 'A' },
        { type: 'op', sym: '·', label: 'X' },
        { type: 'op', sym: '=' },
        { type: 'matrix', id: 'B' },
      ],
    },
    'XA=B': {
      label: 'X · A = B',
      navText: 'XA=B',
      sequence: [
        { type: 'op', label: 'X', sym: '·', leading: true },
        { type: 'matrix', id: 'A' },
        { type: 'op', sym: '=' },
        { type: 'matrix', id: 'B' },
      ],
    },
    'AXB=C': {
      label: 'A · X · B = C',
      navText: 'AXB=C',
      sequence: [
        { type: 'matrix', id: 'A' },
        { type: 'op', sym: '·', label: 'X' },
        { type: 'matrix', id: 'B' },
        { type: 'op', sym: '=' },
        { type: 'matrix', id: 'C' },
      ],
    },
  };

  let state = {
    size: 4,
    form: 'AX=B',
  };

  // ==========================================================================
  // RENDER
  // ==========================================================================
  function render() {
    document.getElementById('size-num').textContent = state.size;
    const form = FORMS[state.form];
    document.getElementById('form-value').textContent = form.label;
    document.getElementById('nav-formula').textContent = form.navText;

    // Picker options selected state
    document.querySelectorAll('.picker-option[data-form]').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.form === state.form);
    });

    // Build equation row
    const row = document.getElementById('equation-row');
    row.innerHTML = '';
    form.sequence.forEach(item => {
      if (item.type === 'matrix') {
        row.appendChild(makeMatrixCard(item.id, state.size));
      } else {
        row.appendChild(makeOpLabel(item));
      }
    });
  }

  function makeMatrixCard(id, n) {
    const card = document.createElement('div');
    card.className = 'matrix-card';
    card.dataset.matrix = id;
    card.innerHTML = `
      <div class="matrix-header">
        <span class="matrix-label">${id} <span class="dim">${n}×${n}</span></span>
        <div class="matrix-actions">
          <button class="mx-act" title="Fullscreen"><svg viewBox="0 0 24 24" fill="none"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
          <button class="mx-act" title="Copy"><svg viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" stroke="currentColor" stroke-width="2"/></svg></button>
          <button class="mx-act" title="Paste"><svg viewBox="0 0 24 24" fill="none"><rect x="6" y="4" width="12" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="M9 3h6v3H9z" stroke="currentColor" stroke-width="2"/></svg></button>
        </div>
      </div>
      <div class="matrix-grid"></div>
    `;
    const grid = card.querySelector('.matrix-grid');
    grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
    grid.style.gridTemplateRows = `repeat(${n}, 1fr)`;
    for (let i = 0; i < n * n; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      grid.appendChild(cell);
    }
    return card;
  }

  function makeOpLabel(item) {
    const el = document.createElement('div');
    el.className = 'op-label';

    if (item.sym === '=') {
      // Just equals sign
      el.innerHTML = `<span class="eq-sym">=</span>`;
      return el;
    }

    // Structures with X:
    // leading: X then sym   (e.g. "X ·" before matrix A in form XA=B)
    // default: sym then X   (e.g. "· X" after matrix A in form AX=B and between A,B in AXB)
    if (item.leading) {
      el.innerHTML = `
        <span class="x">X</span>
        <span class="sym">${item.sym}</span>
      `;
    } else if (item.label) {
      el.innerHTML = `
        <span class="sym">${item.sym}</span>
        <span class="x">X</span>
        <span class="sym">${item.sym}</span>
      `;
      // But AX=B only has one · between A and X, not X flanked by dots.
      // Actually if the op comes after matrix A and is followed by = B,
      // we want: A [· X] = B  → one sym before X
      // If op comes between A and B (form AXB=C), we want: A [· X ·] B
      // So we distinguish by the item context. Simplify: if this op has another matrix to right that's not =,
      // show sym on both sides; else only before.
      // We'll handle this in sequence building — each op carries a flag.
    } else {
      el.innerHTML = `<span class="sym">${item.sym}</span>`;
    }
    return el;
  }

  // Refine FORMS sequences with explicit sym-placement flags
  // AX=B: A [· X] = B  → op after A: sym-before-X only
  // XA=B: [X ·] A = B  → op before A: X-then-sym
  // AXB=C: A [· X ·] B = C  → op between A and B: sym-X-sym
  FORMS['AX=B'].sequence = [
    { type: 'matrix', id: 'A' },
    { type: 'op', variant: 'sym-x', sym: '·' },
    { type: 'op', variant: 'eq' },
    { type: 'matrix', id: 'B' },
  ];
  FORMS['XA=B'].sequence = [
    { type: 'op', variant: 'x-sym', sym: '·' },
    { type: 'matrix', id: 'A' },
    { type: 'op', variant: 'eq' },
    { type: 'matrix', id: 'B' },
  ];
  FORMS['AXB=C'].sequence = [
    { type: 'matrix', id: 'A' },
    { type: 'op', variant: 'sym-x-sym', sym: '·' },
    { type: 'matrix', id: 'B' },
    { type: 'op', variant: 'eq' },
    { type: 'matrix', id: 'C' },
  ];

  function makeOpLabelV2(item) {
    const el = document.createElement('div');
    el.className = 'op-label';
    switch (item.variant) {
      case 'eq':
        el.innerHTML = `<span class="eq-sym">=</span>`;
        break;
      case 'sym-x':
        el.innerHTML = `<span class="sym">${item.sym}</span><span class="x">X</span>`;
        break;
      case 'x-sym':
        el.innerHTML = `<span class="x">X</span><span class="sym">${item.sym}</span>`;
        break;
      case 'sym-x-sym':
        el.innerHTML = `<span class="sym">${item.sym}</span><span class="x">X</span><span class="sym">${item.sym}</span>`;
        break;
    }
    return el;
  }

  // Override render to use v2
  function renderV2() {
    document.getElementById('size-num').textContent = state.size;
    const form = FORMS[state.form];
    document.getElementById('form-value').textContent = form.label;
    document.getElementById('nav-formula').textContent = form.navText;

    document.querySelectorAll('.picker-option[data-form]').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.form === state.form);
    });

    const row = document.getElementById('equation-row');
    row.innerHTML = '';
    form.sequence.forEach(item => {
      if (item.type === 'matrix') {
        row.appendChild(makeMatrixCard(item.id, state.size));
      } else {
        row.appendChild(makeOpLabelV2(item));
      }
    });

    // Scroll equation to start (left edge) when form changes
    document.querySelector('.equation-scroll').scrollLeft = 0;
  }

  // ==========================================================================
  // INTERACTIONS
  // ==========================================================================
  document.querySelectorAll('#size-stepper .size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const delta = parseInt(btn.dataset.delta, 10);
      const next = state.size + delta;
      if (next >= 2 && next <= 10) {
        state.size = next;
        renderV2();
      }
    });
  });

  const backdrop = document.getElementById('modal-backdrop');
  const formSheet = document.getElementById('form-sheet');
  function openPicker() {
    backdrop.classList.add('open');
    formSheet.classList.add('open');
  }
  function closePicker() {
    backdrop.classList.remove('open');
    formSheet.classList.remove('open');
  }
  document.getElementById('form-trigger').addEventListener('click', openPicker);
  backdrop.addEventListener('click', closePicker);
  document.querySelectorAll('[data-close-picker]').forEach(b => b.addEventListener('click', closePicker));

  document.querySelectorAll('.picker-option[data-form]').forEach(opt => {
    opt.addEventListener('click', () => {
      state.form = opt.dataset.form;
      renderV2();
      closePicker();
    });
  });

  // Theme
  const phone = document.getElementById('phone');
  document.getElementById('theme-toggle').addEventListener('click', e => {
    const btn = e.target.closest('button'); if (!btn) return;
    phone.classList.toggle('light', btn.dataset.theme === 'light');
    document.getElementById('theme-toggle').querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });

  renderV2();
</script>

</body>
</html>
