<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Matrix multiplication · HMLA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-elev: #12121a;
    --bg-elev-2: #191922;
    --purple: #8b8bff;
    --purple-soft: rgba(139, 139, 255, 0.12);
    --teal: #6ee7b7;
    --teal-soft: rgba(110, 231, 183, 0.12);
    --red: #ff7a7a;
    --red-soft: rgba(255, 122, 122, 0.12);
    --text: #ededf2;
    --text-dim: #8a8a99;
    --text-faint: #4a4a5a;
    --border: #232330;
    --border-soft: #1c1c28;
    --solve-text: #0a0a0f;
    --cell-empty: #4a4a5a;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(139, 139, 255, 0.08), 0 10px 40px rgba(0, 0, 0, 0.6);

    /* Operation color: multiplication = yellow */
    --op-color: #fde047;
    --op-color-soft: rgba(253, 224, 71, 0.12);
  }

  .phone.light {
    --bg: #f5f4f0;
    --bg-elev: #ffffff;
    --bg-elev-2: #f5f4f0;
    --purple: #5c5cd6;
    --purple-soft: rgba(92, 92, 214, 0.10);
    --teal: #0fb87a;
    --teal-soft: rgba(15, 184, 122, 0.10);
    --red: #e04a4a;
    --red-soft: rgba(224, 74, 74, 0.08);
    --text: #1a1a22;
    --text-dim: #6a6a78;
    --text-faint: #b8b8c2;
    --border: #e6e5dd;
    --border-soft: #ecebe4;
    --solve-text: #ffffff;
    --cell-empty: #c8c7bf;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(92, 92, 214, 0.12), 0 10px 40px rgba(0, 0, 0, 0.4);

    --op-color: #a16207;
    --op-color-soft: rgba(161, 98, 7, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; flex-direction: column; align-items: center;
    padding: 24px; gap: 14px;
  }

  .controls-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: #5a5a68;
    letter-spacing: 1px; text-transform: uppercase;
    text-align: center;
  }

  .toggle {
    display: inline-flex;
    background: #1a1a22; border: 1px solid #2a2a35;
    border-radius: 999px; padding: 4px; gap: 2px;
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .toggle button {
    background: transparent; border: 0;
    color: #8a8a99; padding: 8px 14px;
    border-radius: 999px; cursor: pointer;
    font: inherit; letter-spacing: inherit; text-transform: inherit;
    transition: all 0.25s ease;
  }
  .toggle button.active { background: #8b8bff; color: #0a0a0f; }

  /* PHONE */
  .phone {
    width: 100%; max-width: 390px;
    aspect-ratio: 390 / 844;
    background: var(--bg); border-radius: 48px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-phone);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
  }
  .island {
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000; border-radius: 20px; z-index: 11;
  }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 28px 0;
    font-size: 15px; font-weight: 600;
    flex-shrink: 0;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; color: var(--text-dim); }
  .status-icons svg { width: 16px; height: 10px; }

  /* NAV */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 14px; gap: 12px;
    flex-shrink: 0;
  }
  .nav-btn {
    width: 38px; height: 38px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .nav-btn:hover { border-color: var(--purple); background: var(--purple-soft); }
  .nav-btn svg { width: 18px; height: 18px; }
  .nav-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 500;
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-title .sep { color: var(--text-faint); font-family: 'DM Mono', monospace; }
  .nav-title .op {
    color: var(--op-color);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
  }

  /* SIZE BAR — 3 vertical rows, each with descriptive label */
  .size-bar {
    margin: 4px 16px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 14px;
    display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .size-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .size-row:last-child { border-bottom: none; }

  .size-row-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: -0.1px;
    display: flex; align-items: center; gap: 8px;
  }
  .size-row-label .tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    padding: 2px 6px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border-soft);
    border-radius: 5px;
    letter-spacing: 0.3px;
  }
  .size-row-label .tag.a { color: var(--purple); border-color: color-mix(in srgb, var(--purple) 30%, transparent); background: var(--purple-soft); }
  .size-row-label .tag.b { color: var(--teal); border-color: color-mix(in srgb, var(--teal) 30%, transparent); background: var(--teal-soft); }

  .stepper-row {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }
  .size-btn {
    width: 26px; height: 26px;
    border-radius: 7px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }
  .size-btn:hover { border-color: var(--purple); color: var(--purple); }
  .size-btn:active { transform: scale(0.92); }
  .stepper-row .num {
    color: var(--purple);
    font-size: 15px; font-weight: 500;
    min-width: 14px; text-align: center;
  }

  /* MATRICES row */
  .matrices-row {
    display: flex;
    align-items: stretch;
    gap: 6px;
    padding: 0 16px;
    margin-bottom: 16px;
    flex-shrink: 0;
  }

  .matrix-card {
    flex: 1;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px;
    position: relative;
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .matrix-card.active {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px var(--purple-soft);
  }
  .matrix-card.is-b.active {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-soft);
  }

  .matrix-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; padding: 0 2px;
  }
  .matrix-label {
    font-family: 'DM Mono', monospace;
    font-size: 15px; font-weight: 500;
    color: var(--purple);
    letter-spacing: 0.5px;
    display: flex; align-items: baseline; gap: 6px;
  }
  .matrix-label .dim {
    font-size: 10px;
    color: var(--text-faint);
    font-weight: 400;
  }
  .matrix-card.is-b .matrix-label { color: var(--teal); }

  .matrix-actions { display: flex; gap: 4px; }
  .mx-act {
    width: 24px; height: 24px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .mx-act:hover { border-color: var(--text-dim); color: var(--text); }
  .mx-act svg { width: 11px; height: 11px; }

  .matrix-grid {
    display: grid; gap: 4px; padding: 2px;
  }
  .cell {
    aspect-ratio: 1;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .cell:empty::before { content: '·'; color: var(--cell-empty); opacity: 0.6; }
  .cell.filled { color: var(--text); }

  /* MID COLUMN — * sign + swap */
  .mid-col {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px;
    padding: 0 2px;
    flex-shrink: 0;
  }
  .op-sign {
    font-family: 'DM Mono', monospace;
    font-size: 20px; font-weight: 400;
    color: var(--text-dim);
    width: 20px; text-align: center;
  }
  .swap-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .swap-btn:hover {
    border-color: var(--purple);
    color: var(--purple);
    background: var(--purple-soft);
  }
  .swap-btn:active { transform: scale(0.92); }
  .swap-btn svg { width: 18px; height: 18px; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .swap-btn.spinning svg { transform: rotate(180deg); }

  .swap-hint {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.5px;
  }

  /* SOLVE */
  .solve-area {
    margin-top: auto;
    padding: 14px 16px;
    border-top: 1px solid var(--border-soft);
    flex-shrink: 0;
  }
  .solve-btn {
    width: 100%; height: 56px;
    background: var(--purple);
    color: var(--solve-text);
    border: 0; border-radius: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 15px; font-weight: 500;
    letter-spacing: 0.5px;
    display: flex; align-items: center; justify-content: center; gap: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 0 30px rgba(139, 139, 255, 0.3);
  }
  .phone.light .solve-btn { box-shadow: 0 10px 30px rgba(92, 92, 214, 0.35); }
  .solve-btn:hover { filter: brightness(1.08); }
  .solve-btn:active { transform: translateY(1px); }
  .solve-btn .eq { opacity: 0.6; font-weight: 400; }

  .home-indicator {
    position: absolute;
    bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px;
    background: var(--text);
    border-radius: 3px;
    opacity: 0.9;
    z-index: 30;
  }
</style>
</head>
<body>

  <div class="controls-hint">matrix multiplication · A · B</div>
  <div class="toggle" id="theme-toggle">
    <button data-theme="dark" class="active">Dark</button>
    <button data-theme="light">Light</button>
  </div>

  <div class="phone" id="phone">
    <div class="island"></div>

    <div class="status-bar">
      <span>11:09</span>
      <div class="status-icons">
        <span style="font-size:13px;letter-spacing:.5px;">•••</span>
        <svg viewBox="0 0 16 10" fill="none"><path d="M14 1v8M11 3v6M8 5v4M5 6v3M2 7v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <svg viewBox="0 0 22 10" fill="none">
          <rect x="1" y="1" width="17" height="8" rx="2" stroke="currentColor" stroke-width="1"/>
          <rect x="2.5" y="2.5" width="14" height="5" rx="1" fill="currentColor"/>
          <rect x="19" y="3.5" width="1.5" height="3" rx="0.5" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-title">
        <span>Matrix</span><span class="sep">·</span><span class="op">×</span><span>Multiply</span>
      </div>
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 16V4M6 10l6-6 6 6M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- SIZE: 3 rows with descriptive labels -->
    <div class="size-bar">
      <div class="size-row">
        <div class="size-row-label">
          Rows of matrix <span class="tag a">A</span>
        </div>
        <div class="stepper-row">
          <button class="size-btn" data-dim="m" data-delta="-1">−</button>
          <span class="num" id="m-num">4</span>
          <button class="size-btn" data-dim="m" data-delta="1">+</button>
        </div>
      </div>
      <div class="size-row">
        <div class="size-row-label">
          Columns of matrix <span class="tag a">A</span>
        </div>
        <div class="stepper-row">
          <button class="size-btn" data-dim="n" data-delta="-1">−</button>
          <span class="num" id="n-num">4</span>
          <button class="size-btn" data-dim="n" data-delta="1">+</button>
        </div>
      </div>
      <div class="size-row">
        <div class="size-row-label">
          Columns of matrix <span class="tag b">B</span>
        </div>
        <div class="stepper-row">
          <button class="size-btn" data-dim="p" data-delta="-1">−</button>
          <span class="num" id="p-num">4</span>
          <button class="size-btn" data-dim="p" data-delta="1">+</button>
        </div>
      </div>
    </div>

    <!-- MATRICES A · B -->
    <div class="matrices-row">
      <div class="matrix-card">
        <div class="matrix-header">
          <span class="matrix-label">A <span class="dim" id="a-dim">4×4</span></span>
          <div class="matrix-actions">
            <button class="mx-act" title="Fullscreen"><svg viewBox="0 0 24 24" fill="none"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button class="mx-act" title="Copy"><svg viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button class="mx-act" title="Paste"><svg viewBox="0 0 24 24" fill="none"><rect x="6" y="4" width="12" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="M9 3h6v3H9z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
          </div>
        </div>
        <div class="matrix-grid" id="gridA"></div>
      </div>

      <div class="mid-col">
        <div class="op-sign">·</div>
        <button class="swap-btn" id="swapBtn" title="Swap A ↔ B">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M7 10h13l-4-4M17 14H4l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="swap-hint">a⇄b</div>
      </div>

      <div class="matrix-card is-b">
        <div class="matrix-header">
          <span class="matrix-label">B <span class="dim" id="b-dim">4×4</span></span>
          <div class="matrix-actions">
            <button class="mx-act"><svg viewBox="0 0 24 24" fill="none"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button class="mx-act"><svg viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button class="mx-act"><svg viewBox="0 0 24 24" fill="none"><rect x="6" y="4" width="12" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="M9 3h6v3H9z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
          </div>
        </div>
        <div class="matrix-grid" id="gridB"></div>
      </div>
    </div>

    <div class="solve-area">
      <button class="solve-btn">
        <span class="eq">=</span>
        <span>solve</span>
      </button>
    </div>

    <div class="home-indicator"></div>
  </div>

<script>
  let dims = { m: 4, n: 4, p: 4 };

  // Cell sizing math: the matrix-card gets flex: 1, so it will auto-size.
  // We need the matrix-grid to adapt to cols/rows with consistent cell size.
  // Grid template columns = cols, rows = rows

  function makeGrid(id, rows, cols) {
    const grid = document.getElementById(id);
    if (!grid) return;
    grid.innerHTML = '';
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    const total = rows * cols;
    for (let i = 0; i < total; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      grid.appendChild(cell);
    }
  }

  function render() {
    // A is m × n, B is n × p, C is m × p
    makeGrid('gridA', dims.m, dims.n);
    makeGrid('gridB', dims.n, dims.p);
    document.getElementById('m-num').textContent = dims.m;
    document.getElementById('n-num').textContent = dims.n;
    document.getElementById('p-num').textContent = dims.p;
    document.getElementById('a-dim').textContent = `${dims.m}×${dims.n}`;
    document.getElementById('b-dim').textContent = `${dims.n}×${dims.p}`;
  }
  render();

  // Size steppers
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const dim = btn.dataset.dim;
      const delta = parseInt(btn.dataset.delta, 10);
      const next = dims[dim] + delta;
      if (next >= 1 && next <= 10) {
        dims[dim] = next;
        render();
      }
    });
  });

  // Swap A ↔ B — swaps m ↔ p (since A is m×n and B is n×p)
  const swapBtn = document.getElementById('swapBtn');
  swapBtn.addEventListener('click', () => {
    swapBtn.classList.add('spinning');
    setTimeout(() => {
      [dims.m, dims.p] = [dims.p, dims.m];
      render();
    }, 200);
    setTimeout(() => swapBtn.classList.remove('spinning'), 600);
  });

  // Theme
  const phone = document.getElementById('phone');
  document.getElementById('theme-toggle').addEventListener('click', e => {
    const btn = e.target.closest('button'); if (!btn) return;
    phone.classList.toggle('light', btn.dataset.theme === 'light');
    document.getElementById('theme-toggle').querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
</script>

</body>
</html>
