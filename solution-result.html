<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solution · Result Block</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-elev: #12121a;
    --bg-elev-2: #191922;
    --purple: #8b8bff;
    --purple-soft: rgba(139, 139, 255, 0.12);
    --purple-glow: rgba(139, 139, 255, 0.28);
    --teal: #6ee7b7;
    --teal-soft: rgba(110, 231, 183, 0.12);
    --amber: #fbbf24;
    --amber-soft: rgba(251, 191, 36, 0.14);
    --amber-glow: rgba(251, 191, 36, 0.25);
    --text: #ededf2;
    --text-dim: #8a8a99;
    --text-faint: #4a4a5a;
    --border: #232330;
    --border-soft: #1c1c28;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(139, 139, 255, 0.08), 0 10px 40px rgba(0, 0, 0, 0.6);
  }

  .phone.light {
    --bg: #f5f4f0;
    --bg-elev: #ffffff;
    --bg-elev-2: #f5f4f0;
    --purple: #5c5cd6;
    --purple-soft: rgba(92, 92, 214, 0.10);
    --purple-glow: rgba(92, 92, 214, 0.25);
    --teal: #0fb87a;
    --teal-soft: rgba(15, 184, 122, 0.10);
    --amber: #c88a06;
    --amber-soft: rgba(200, 138, 6, 0.12);
    --amber-glow: rgba(200, 138, 6, 0.22);
    --text: #1a1a22;
    --text-dim: #6a6a78;
    --text-faint: #b8b8c2;
    --border: #e6e5dd;
    --border-soft: #ecebe4;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(92, 92, 214, 0.12), 0 10px 40px rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 14px;
  }

  .controls {
    display: flex;
    gap: 10px;
  }
  .toggle {
    display: inline-flex;
    background: #1a1a22;
    border: 1px solid #2a2a35;
    border-radius: 999px;
    padding: 4px;
    gap: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .toggle button {
    background: transparent; border: 0;
    color: #8a8a99;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit; letter-spacing: inherit; text-transform: inherit;
    transition: all 0.25s ease;
  }
  .toggle button.active { background: #8b8bff; color: #0a0a0f; }

  .phone {
    width: 100%;
    max-width: 390px;
    aspect-ratio: 390 / 844;
    background: var(--bg);
    border-radius: 48px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-phone);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
  }

  .island {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 11;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 28px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; color: var(--text-dim); }
  .status-icons svg { width: 16px; height: 10px; }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    gap: 12px;
  }
  .nav-btn {
    width: 38px; height: 38px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text);
    cursor: pointer;
  }
  .nav-btn svg { width: 18px; height: 18px; }
  .nav-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-title .sep { color: var(--text-faint); font-family: 'DM Mono', monospace; }
  .nav-title .op { color: var(--purple); font-family: 'DM Mono', monospace; font-size: 18px; }

  /* Scroll */
  .scroll {
    flex: 1;
    overflow-y: auto;
    padding: 4px 16px 30px;
  }

  /* Step meta */
  .step-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .step-meta .step-badge {
    display: flex; align-items: center; gap: 8px;
  }
  .step-meta .step-num {
    width: 22px; height: 22px;
    border-radius: 7px;
    background: var(--amber-soft);
    color: var(--amber);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 500;
  }

  /* Faded preview block above answer (simulating scroll context) */
  .preview-above {
    opacity: 0.35;
    pointer-events: none;
    margin-bottom: 18px;
    filter: blur(0.3px);
  }
  .preview-above .card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
  }
  .preview-above .card-title {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .preview-above .marker {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--purple);
  }
  .preview-above h3 {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--purple);
  }
  .preview-above .p-line {
    height: 10px; background: var(--bg);
    border-radius: 4px; margin-bottom: 6px;
    border: 1px solid var(--border-soft);
  }

  /* ========= ANSWER CARD ========= */
  .answer-card {
    position: relative;
    background: var(--bg-elev);
    border: 1px solid var(--purple);
    border-radius: 20px;
    padding: 22px 18px 20px;
    overflow: hidden;
    box-shadow:
      0 0 0 4px var(--purple-soft),
      0 20px 50px -10px var(--purple-glow);
    animation: cardIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Atmospheric gradient background */
  .answer-card::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px; right: -40px;
    height: 160px;
    background:
      radial-gradient(ellipse 60% 60% at 30% 50%, var(--purple-soft), transparent 70%),
      radial-gradient(ellipse 60% 60% at 80% 30%, var(--amber-soft), transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: gradShift 8s ease-in-out infinite;
  }
  @keyframes gradShift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(10px, 5px); }
  }

  .answer-card > * {
    position: relative;
    z-index: 1;
  }

  /* Header row */
  .answer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .answer-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px 6px 8px;
    background: var(--amber-soft);
    border: 1px solid var(--amber);
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--amber);
  }
  .answer-badge .check {
    width: 14px; height: 14px;
    background: var(--amber);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: checkPulse 2s ease-in-out infinite;
  }
  .answer-badge .check svg {
    width: 9px; height: 9px;
    color: var(--bg);
  }
  @keyframes checkPulse {
    0%, 100% { box-shadow: 0 0 0 0 var(--amber-glow); }
    50% { box-shadow: 0 0 0 6px transparent; }
  }

  .answer-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Matrix result container */
  .result-container {
    position: relative;
    padding: 24px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border-radius: 14px;
    margin-bottom: 16px;
    border: 1px solid var(--border-soft);
  }

  /* Corner markers */
  .result-container::before,
  .result-container::after,
  .result-container > .corner-tl,
  .result-container > .corner-tr {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border: 2px solid var(--purple);
    opacity: 0.7;
  }
  .result-container::before {
    top: 6px; left: 6px;
    border-right: 0;
    border-bottom: 0;
    border-top-left-radius: 6px;
  }
  .result-container::after {
    bottom: 6px; right: 6px;
    border-left: 0;
    border-top: 0;
    border-bottom-right-radius: 6px;
  }
  .result-container .corner-tl {
    top: 6px; right: 6px;
    border-left: 0;
    border-bottom: 0;
    border-top-right-radius: 6px;
  }
  .result-container .corner-tr {
    bottom: 6px; left: 6px;
    border-right: 0;
    border-top: 0;
    border-bottom-left-radius: 6px;
  }

  /* The result matrix itself */
  .result-matrix {
    display: inline-flex;
    align-items: stretch;
    gap: 10px;
    animation: matrixIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s backwards;
  }
  @keyframes matrixIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }

  .big-bracket {
    width: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
    color: var(--amber);
  }
  .big-bracket svg { width: 16px; height: 100%; }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(4, auto);
    gap: 4px 12px;
    padding: 6px 2px;
  }
  .result-grid > span {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--amber);
    min-width: 28px;
    min-height: 28px;
    animation: cellPop 0.4s cubic-bezier(0.2, 1.2, 0.3, 1.1) backwards;
  }
  .result-grid > span.neg {
    color: var(--amber);
    opacity: 0.85;
  }
  @keyframes cellPop {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Stagger for cells */
  .result-grid > span:nth-child(1)  { animation-delay: 0.45s; }
  .result-grid > span:nth-child(2)  { animation-delay: 0.50s; }
  .result-grid > span:nth-child(3)  { animation-delay: 0.55s; }
  .result-grid > span:nth-child(4)  { animation-delay: 0.60s; }
  .result-grid > span:nth-child(5)  { animation-delay: 0.65s; }
  .result-grid > span:nth-child(6)  { animation-delay: 0.70s; }
  .result-grid > span:nth-child(7)  { animation-delay: 0.75s; }
  .result-grid > span:nth-child(8)  { animation-delay: 0.80s; }
  .result-grid > span:nth-child(9)  { animation-delay: 0.85s; }
  .result-grid > span:nth-child(10) { animation-delay: 0.90s; }
  .result-grid > span:nth-child(11) { animation-delay: 0.95s; }
  .result-grid > span:nth-child(12) { animation-delay: 1.00s; }
  .result-grid > span:nth-child(13) { animation-delay: 1.05s; }
  .result-grid > span:nth-child(14) { animation-delay: 1.10s; }
  .result-grid > span:nth-child(15) { animation-delay: 1.15s; }
  .result-grid > span:nth-child(16) { animation-delay: 1.20s; }

  /* Result stats row */
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 16px;
    padding: 8px 0;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    animation: fadeIn 0.6s ease 1s backwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-stat {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-stat .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-faint);
  }
  .result-stat .val {
    color: var(--purple);
    font-weight: 500;
  }

  /* Replay button (small) */
  .replay-btn {
    position: absolute;
    top: 22px;
    right: 18px;
    width: 30px; height: 30px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    z-index: 5;
  }
  .replay-btn:hover {
    color: var(--purple);
    border-color: var(--purple);
  }
  .replay-btn:active {
    transform: rotate(-90deg);
  }
  .replay-btn svg { width: 14px; height: 14px; }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 134px; height: 5px;
    background: var(--text);
    border-radius: 3px;
    opacity: 0.9;
    z-index: 30;
  }

  .controls-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #5a5a68;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>

  <div class="controls-hint">solution · result block</div>
  <div class="controls">
    <div class="toggle" id="theme-toggle">
      <button data-theme="dark" class="active">Dark</button>
      <button data-theme="light">Light</button>
    </div>
  </div>

  <div class="phone" id="phone">
    <div class="island"></div>

    <div class="status-bar">
      <span>11:51</span>
      <div class="status-icons">
        <span style="font-size:13px;letter-spacing:.5px;">•••</span>
        <svg viewBox="0 0 16 10" fill="none"><path d="M14 1v8M11 3v6M8 5v4M5 6v3M2 7v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <svg viewBox="0 0 22 10" fill="none">
          <rect x="1" y="1" width="17" height="8" rx="2" stroke="currentColor" stroke-width="1"/>
          <rect x="2.5" y="2.5" width="14" height="5" rx="1" fill="currentColor"/>
          <rect x="19" y="3.5" width="1.5" height="3" rx="0.5" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-title">
        <span>Matrix</span><span class="sep">·</span><span class="op">+</span><span>Addition</span>
      </div>
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 16V4M6 10l6-6 6 6M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="scroll">

      <!-- Faded preview of description block above -->
      <div class="preview-above">
        <div class="step-meta" style="opacity: 0.6;">
          <div class="step-badge">
            <span class="step-num" style="background: var(--purple-soft); color: var(--purple);">1</span>
            <span>solution</span>
          </div>
          <span>step 1 of 2</span>
        </div>
        <div class="card">
          <div class="card-title">
            <span class="marker"></span>
            <h3>computation · c = a + b</h3>
          </div>
          <div class="p-line" style="width: 90%;"></div>
          <div class="p-line" style="width: 75%;"></div>
          <div class="p-line" style="width: 85%;"></div>
          <div class="p-line" style="width: 60%;"></div>
        </div>
      </div>

      <!-- Step meta -->
      <div class="step-meta">
        <div class="step-badge">
          <span class="step-num">✓</span>
          <span>result</span>
        </div>
        <span>final · step 2 of 2</span>
      </div>

      <!-- ========= RESULT CARD ========= -->
      <div class="answer-card" id="answerCard">
        <!-- Corner markers -->
        <div class="corner-tl"></div>
        <div class="corner-tr"></div>

        <!-- Replay animation button -->
        <button class="replay-btn" id="replayBtn" title="Replay animation">
          <svg viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 11-3-6.7M21 4v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <!-- Header -->
        <div class="answer-header">
          <div class="answer-badge">
            <span class="check">
              <svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <span>Result</span>
          </div>
          <span class="answer-meta">c = a + b</span>
        </div>

        <!-- Result matrix -->
        <div class="result-container">
          <div class="result-matrix">
            <div class="big-bracket">
              <svg viewBox="0 0 16 100" preserveAspectRatio="none" fill="none">
                <path d="M12 1 L3 1 L3 99 L12 99" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="result-grid">
              <span>8</span><span>4</span><span>2</span><span>6</span>
              <span>0</span><span>2</span><span class="neg">−2</span><span>4</span>
              <span>6</span><span>10</span><span>4</span><span>2</span>
              <span class="neg">−4</span><span>0</span><span>2</span><span>2</span>
            </div>
            <div class="big-bracket">
              <svg viewBox="0 0 16 100" preserveAspectRatio="none" fill="none">
                <path d="M4 1 L13 1 L13 99 L4 99" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- Stats row -->
        <div class="result-stats">
          <div class="result-stat">
            <span>size</span>
            <span class="val">4×4</span>
          </div>
          <span class="dot"></span>
          <div class="result-stat">
            <span>computed</span>
            <span class="val">16 ops</span>
          </div>
          <span class="dot"></span>
          <div class="result-stat">
            <span>time</span>
            <span class="val">0.02s</span>
          </div>
        </div>
      </div>

    </div>

    <div class="home-indicator"></div>
  </div>

<script>
  const phone = document.getElementById('phone');
  const themeToggle = document.getElementById('theme-toggle');
  themeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    phone.classList.remove('light');
    if (btn.dataset.theme === 'light') phone.classList.add('light');
    themeToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });

  // Replay animation
  const replayBtn = document.getElementById('replayBtn');
  const answerCard = document.getElementById('answerCard');
  replayBtn.addEventListener('click', () => {
    // Clone + replace to restart animations
    const clone = answerCard.cloneNode(true);
    answerCard.parentNode.replaceChild(clone, answerCard);
    // Re-wire replay button on clone
    const newReplay = clone.querySelector('#replayBtn');
    newReplay.addEventListener('click', () => replayBtn.click());
  });
</script>

</body>
</html>
