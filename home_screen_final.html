<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Home · HMLA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* =========================================================================
     TOKENS — master (matrix-addition-main.html)
     ========================================================================= */
  :root {
    --bg: #0a0a0f;
    --bg-elev: #12121a;
    --bg-elev-2: #191922;
    --purple: #8b8bff;
    --purple-soft: rgba(139, 139, 255, 0.12);
    --teal: #6ee7b7;
    --teal-soft: rgba(110, 231, 183, 0.12);
    --red: #ff7a7a;
    --red-soft: rgba(255, 122, 122, 0.12);
    --text: #ededf2;
    --text-dim: #8a8a99;
    --text-faint: #4a4a5a;
    --border: #232330;
    --border-soft: #1c1c28;
    --solve-text: #0a0a0f;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(139, 139, 255, 0.08), 0 10px 40px rgba(0, 0, 0, 0.6);

    /* Operation colors */
    --op-add: #67e8f9;
    --op-subtract: #22d3ee;
    --op-scalar: #06b6d4;
    --op-multiply: #fde047;
    --op-power: #fbbf24;
    --op-determinant: #ffb86e;
    --op-inverse: #fb7185;
    --op-minor: #f472b6;
    --op-cofactor: #e879f9;
    --op-adjoint: #d8b4fe;
    --op-transpose: #7dd3fc;
    --op-conjugate: #38bdf8;
    --op-sqrt: #f0abfc;
    --op-lu: #a3e635;
    --op-qr: #34d399;
    --op-cholesky: #10b981;
    --op-schur: #14b8a6;
    --op-eigendecomp: #22d3ee;
    --op-eigenvalues: #6ee7b7;
    --op-eigenvectors: #a7f3d0;
    --op-polar: #8b8bff;
    --op-svd: #c4b5fd;
    --op-rank: #f9a8d4;
    --op-system: #c4b5fd;
    --op-equations: #fcd34d;
  }

  .phone.light {
    --bg: #f5f4f0;
    --bg-elev: #ffffff;
    --bg-elev-2: #f5f4f0;
    --purple: #5c5cd6;
    --purple-soft: rgba(92, 92, 214, 0.10);
    --teal: #0fb87a;
    --teal-soft: rgba(15, 184, 122, 0.10);
    --red: #e04a4a;
    --red-soft: rgba(224, 74, 74, 0.08);
    --text: #1a1a22;
    --text-dim: #6a6a78;
    --text-faint: #b8b8c2;
    --border: #e6e5dd;
    --border-soft: #ecebe4;
    --solve-text: #ffffff;
    --shadow-phone: 0 0 0 2px #000, 0 30px 80px rgba(92, 92, 214, 0.12), 0 10px 40px rgba(0, 0, 0, 0.4);

    --op-add: #0e7490;
    --op-subtract: #0891b2;
    --op-scalar: #155e75;
    --op-multiply: #a16207;
    --op-power: #b45309;
    --op-determinant: #c2410c;
    --op-inverse: #e11d48;
    --op-minor: #be185d;
    --op-cofactor: #a21caf;
    --op-adjoint: #7e22ce;
    --op-transpose: #0284c7;
    --op-conjugate: #0369a1;
    --op-sqrt: #c026d3;
    --op-lu: #65a30d;
    --op-qr: #059669;
    --op-cholesky: #047857;
    --op-schur: #0d9488;
    --op-eigendecomp: #0891b2;
    --op-eigenvalues: #0fb87a;
    --op-eigenvectors: #10b981;
    --op-polar: #5c5cd6;
    --op-svd: #7c3aed;
    --op-rank: #be185d;
    --op-system: #7c3aed;
    --op-equations: #a16207;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 14px;
  }

  /* =========================================================================
     CONTROLS (outside phone)
     ========================================================================= */
  .controls-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #5a5a68;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }

  .toggle {
    display: inline-flex;
    background: #1a1a22;
    border: 1px solid #2a2a35;
    border-radius: 999px;
    padding: 4px;
    gap: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .toggle button {
    background: transparent; border: 0;
    color: #8a8a99;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit; letter-spacing: inherit; text-transform: inherit;
    transition: all 0.25s ease;
  }
  .toggle button.active { background: #8b8bff; color: #0a0a0f; }

  /* =========================================================================
     PHONE FRAME
     ========================================================================= */
  .phone {
    width: 100%;
    max-width: 390px;
    aspect-ratio: 390 / 844;
    background: var(--bg);
    border-radius: 48px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-phone);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
  }

  .island {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 11;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 28px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; color: var(--text-dim); }
  .status-icons svg { width: 16px; height: 10px; }

  /* =========================================================================
     NAV
     ========================================================================= */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 14px;
    gap: 12px;
    flex-shrink: 0;
  }
  .nav-btn {
    width: 38px; height: 38px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .nav-btn:hover { border-color: var(--purple); background: var(--purple-soft); }
  .nav-btn svg { width: 18px; height: 18px; }
  .nav-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }
  .nav-title .sep { color: var(--text-faint); font-family: 'DM Mono', monospace; }
  .nav-title .brand {
    color: var(--purple);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* =========================================================================
     SEARCH BAR
     ========================================================================= */
  .search-bar {
    margin: 4px 16px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.2s ease;
    flex-shrink: 0;
  }
  .search-bar:focus-within { border-color: var(--purple); }
  .search-bar svg { color: var(--text-faint); flex-shrink: 0; }
  .search-bar input {
    flex: 1; background: transparent; border: 0; outline: 0;
    color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif;
  }
  .search-bar input::placeholder {
    color: var(--text-faint);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.5px;
  }

  /* =========================================================================
     SCROLLABLE CONTENT
     ========================================================================= */
  .scroll-body {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
    padding-bottom: 20px;
  }
  .scroll-body::-webkit-scrollbar { display: none; }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: lowercase;
    color: var(--text-dim);
    padding: 0 22px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .count {
    color: var(--text-faint);
  }
  .section { margin-bottom: 18px; }

  /* =========================================================================
     RECENT (horizontal scroll)
     ========================================================================= */
  .recent-scroll {
    display: flex; gap: 8px; padding: 0 16px 4px;
    overflow-x: auto; scrollbar-width: none;
  }
  .recent-scroll::-webkit-scrollbar { display: none; }
  .recent-card {
    flex-shrink: 0; width: 110px;
    padding: 12px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .recent-card:hover {
    border-color: var(--op-color, var(--purple));
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--op-color, var(--purple)) 12%, transparent);
  }
  .recent-card:active { transform: scale(0.97); }
  .recent-card .icon {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--op-color, var(--purple));
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .recent-card .name {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.25;
    letter-spacing: -0.2px;
  }
  .recent-card .time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.5px;
  }

  /* =========================================================================
     GRID
     ========================================================================= */
  .op-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0 16px;
  }
  .op-tile {
    aspect-ratio: 1;
    padding: 10px 8px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
  }
  .op-tile:hover {
    border-color: var(--op-color, var(--purple));
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--op-color, var(--purple)) 12%, transparent);
  }
  .op-tile:active { transform: scale(0.96); }
  .op-tile .icon {
    font-family: 'DM Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    color: var(--op-color, var(--purple));
    letter-spacing: 0.3px;
    line-height: 1;
  }
  .op-tile .name {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.25;
    letter-spacing: -0.1px;
  }

  /* =========================================================================
     HOME INDICATOR
     ========================================================================= */
  .home-indicator {
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 134px; height: 5px;
    background: var(--text);
    border-radius: 3px;
    opacity: 0.9;
    z-index: 30;
  }
</style>
</head>
<body>

  <div class="controls-hint">home screen · hub</div>

  <div class="toggle" id="theme-toggle">
    <button data-theme="dark" class="active">Dark</button>
    <button data-theme="light">Light</button>
  </div>

  <!-- ========================================================================
       PHONE
       ======================================================================== -->
  <div class="phone" id="phone">
    <div class="island"></div>

    <div class="status-bar">
      <span>00:32</span>
      <div class="status-icons">
        <span style="font-size:13px;letter-spacing:.5px;">•••</span>
        <svg viewBox="0 0 16 10" fill="none"><path d="M14 1v8M11 3v6M8 5v4M5 6v3M2 7v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <svg viewBox="0 0 22 10" fill="none">
          <rect x="1" y="1" width="17" height="8" rx="2" stroke="currentColor" stroke-width="1"/>
          <rect x="2.5" y="2.5" width="14" height="5" rx="1" fill="currentColor"/>
          <rect x="19" y="3.5" width="1.5" height="3" rx="0.5" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- NAV -->
    <div class="nav">
      <button class="nav-btn" title="Menu">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="nav-title">
        <span class="brand">HMLA</span><span class="sep">·</span><span>home</span>
      </div>
      <button class="nav-btn" title="History">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- SEARCH -->
    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="search 25 operations...">
    </div>

    <!-- SCROLLABLE CONTENT -->
    <div class="scroll-body">

      <!-- RECENT -->
      <div class="section">
        <div class="section-title">
          <span>recent</span>
          <span class="count">· last 5</span>
        </div>
        <div class="recent-scroll" id="recent-scroll"></div>
      </div>

      <!-- GRID: categories -->
      <div class="section">
        <div class="section-title"><span>arithmetic</span><span class="count">· 5</span></div>
        <div class="op-grid" data-cat="arithmetic"></div>
      </div>
      <div class="section">
        <div class="section-title"><span>properties</span><span class="count">· 6</span></div>
        <div class="op-grid" data-cat="properties"></div>
      </div>
      <div class="section">
        <div class="section-title"><span>transformations</span><span class="count">· 3</span></div>
        <div class="op-grid" data-cat="transforms"></div>
      </div>
      <div class="section">
        <div class="section-title"><span>decompositions</span><span class="count">· 7</span></div>
        <div class="op-grid" data-cat="decomp"></div>
      </div>
      <div class="section">
        <div class="section-title"><span>eigen</span><span class="count">· 2</span></div>
        <div class="op-grid" data-cat="eigen"></div>
      </div>
      <div class="section">
        <div class="section-title"><span>equations</span><span class="count">· 2</span></div>
        <div class="op-grid" data-cat="equations"></div>
      </div>

    </div>

    <div class="home-indicator"></div>
  </div>

<script>
  // ==========================================================================
  // OPERATIONS
  // ==========================================================================
  const operations = [
    { key: 'add',         name: 'Matrix addition',          short: 'Addition',      symbol: 'A+B',    category: 'arithmetic', color: 'add' },
    { key: 'subtract',    name: 'Matrix subtraction',       short: 'Subtraction',   symbol: 'A−B',    category: 'arithmetic', color: 'subtract' },
    { key: 'scalar',      name: 'Multiply by scalar',       short: 'Scalar',        symbol: 'k·A',    category: 'arithmetic', color: 'scalar' },
    { key: 'multiply',    name: 'Matrix multiplication',    short: 'Multiply',      symbol: 'A·B',    category: 'arithmetic', color: 'multiply' },
    { key: 'power',       name: 'Power of a matrix',        short: 'Power',         symbol: 'Aⁿ',     category: 'arithmetic', color: 'power' },
    { key: 'determinant', name: 'Matrix determinant',       short: 'Determinant',   symbol: 'det',    category: 'properties', color: 'determinant' },
    { key: 'inverse',     name: 'Matrix inverse',           short: 'Inverse',       symbol: 'A⁻¹',    category: 'properties', color: 'inverse' },
    { key: 'minor',       name: 'Matrix minor',             short: 'Minor',         symbol: 'Mᵢⱼ',   category: 'properties', color: 'minor' },
    { key: 'cofactor',    name: 'Matrix cofactor',          short: 'Cofactor',      symbol: 'Cᵢⱼ',   category: 'properties', color: 'cofactor' },
    { key: 'adjoint',     name: 'Matrix adjoint',           short: 'Adjoint',       symbol: 'adj',    category: 'properties', color: 'adjoint' },
    { key: 'rank',        name: 'Rank of matrix',           short: 'Rank',          symbol: 'rk',     category: 'properties', color: 'rank' },
    { key: 'transpose',   name: 'Transpose matrix',         short: 'Transpose',     symbol: 'Aᵀ',     category: 'transforms', color: 'transpose' },
    { key: 'conjugate',   name: 'Conjugate matrix',         short: 'Conjugate',     symbol: 'Ā',      category: 'transforms', color: 'conjugate' },
    { key: 'sqrt',        name: 'Square root',              short: 'Square root',   symbol: '√A',     category: 'transforms', color: 'sqrt' },
    { key: 'lu',          name: 'LU decomposition',         short: 'LU',            symbol: 'LU',     category: 'decomp', color: 'lu' },
    { key: 'qr',          name: 'QR decomposition',         short: 'QR',            symbol: 'QR',     category: 'decomp', color: 'qr' },
    { key: 'cholesky',    name: 'Cholesky decomposition',   short: 'Cholesky',      symbol: 'LLᵀ',   category: 'decomp', color: 'cholesky' },
    { key: 'schur',       name: 'Schur decomposition',      short: 'Schur',         symbol: 'QT',     category: 'decomp', color: 'schur' },
    { key: 'eigendecomp', name: 'Eigendecomposition',       short: 'Eigendecomp',   symbol: 'PDP',    category: 'decomp', color: 'eigendecomp' },
    { key: 'polar',       name: 'Polar decomposition',      short: 'Polar',         symbol: 'QH',     category: 'decomp', color: 'polar' },
    { key: 'svd',         name: 'Singular Value Decomposition', short: 'SVD',       symbol: 'UΣV',   category: 'decomp', color: 'svd' },
    { key: 'eigenvalues', name: 'Eigenvalues',              short: 'Eigenvalues',   symbol: 'λ',      category: 'eigen', color: 'eigenvalues' },
    { key: 'eigenvectors',name: 'Eigenvectors',             short: 'Eigenvectors',  symbol: 'v',      category: 'eigen', color: 'eigenvectors' },
    { key: 'matrix-eq',   name: 'Matrix equations',         short: 'Matrix eq.',    symbol: 'AX=B',  category: 'equations', color: 'equations' },
    { key: 'system-eq',   name: 'System of linear equations', short: 'Linear sys.', symbol: '{Ax=b',  category: 'equations', color: 'system' },
  ];

  const recent = [
    { key: 'lu', time: '13:19' },
    { key: 'determinant', time: '13:19' },
    { key: 'multiply', time: '13:19' },
    { key: 'add', time: '11:50' },
    { key: 'polar', time: 'yesterday' },
  ];

  // ==========================================================================
  // RENDER
  // ==========================================================================
  function applyOpColor(el, colorKey) {
    el.style.setProperty('--op-color', `var(--op-${colorKey})`);
  }

  function renderGrid() {
    const cats = ['arithmetic', 'properties', 'transforms', 'decomp', 'eigen', 'equations'];
    cats.forEach(cat => {
      const container = document.querySelector(`.op-grid[data-cat="${cat}"]`);
      if (!container) return;
      container.innerHTML = '';
      operations.filter(o => o.category === cat).forEach(op => {
        const tile = document.createElement('div');
        tile.className = 'op-tile';
        tile.innerHTML = `
          <div class="icon">${op.symbol}</div>
          <div class="name">${op.short}</div>
        `;
        applyOpColor(tile, op.color);
        container.appendChild(tile);
      });
    });
  }

  function renderRecent() {
    const container = document.getElementById('recent-scroll');
    container.innerHTML = '';
    recent.forEach(r => {
      const op = operations.find(o => o.key === r.key);
      if (!op) return;
      const card = document.createElement('div');
      card.className = 'recent-card';
      card.innerHTML = `
        <div class="icon">${op.symbol}</div>
        <div class="name">${op.short}</div>
        <div class="time">${r.time}</div>
      `;
      applyOpColor(card, op.color);
      container.appendChild(card);
    });
  }

  // ==========================================================================
  // SEARCH
  // ==========================================================================
  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    if (!q) {
      document.querySelectorAll('.op-tile, .section').forEach(el => el.style.display = '');
      return;
    }
    document.querySelectorAll('.op-tile').forEach(el => {
      const name = el.querySelector('.name').textContent.toLowerCase();
      el.style.display = name.includes(q) ? '' : 'none';
    });
    document.querySelectorAll('.op-grid').forEach(container => {
      const hasVisible = [...container.children].some(c => c.style.display !== 'none');
      container.closest('.section').style.display = hasVisible ? '' : 'none';
    });
  });

  // ==========================================================================
  // THEME TOGGLE
  // ==========================================================================
  const phone = document.getElementById('phone');
  document.getElementById('theme-toggle').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    phone.classList.toggle('light', btn.dataset.theme === 'light');
    document.getElementById('theme-toggle').querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });

  // ==========================================================================
  // INIT
  // ==========================================================================
  renderGrid();
  renderRecent();
</script>

</body>
</html>
